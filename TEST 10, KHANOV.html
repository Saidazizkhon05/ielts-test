<title>IELTS Reading – Full Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;background:#f8f8f8}

/* ── HEADER ── */
#hdr{height:52px;background:#fff;border-bottom:2px solid #e4e4e4;display:flex;align-items:center;padding:0 16px;justify-content:space-between;flex-shrink:0;position:relative;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.hdr-left{display:flex;align-items:center;gap:12px}
#ielts-badge{font-weight:900;font-size:17px;color:#c41230;letter-spacing:2px;text-transform:uppercase;border:2px solid #c41230;padding:3px 10px;border-radius:4px}
.tg-pill{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,#2CA5E0,#1A76B5);color:#fff;border-radius:20px;padding:5px 14px 5px 6px;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;box-shadow:0 2px 8px rgba(28,140,201,.3)}
.tg-pill:hover{filter:brightness(1.1)}
.hdr-right{display:flex;align-items:center;gap:10px}
#hamburger-btn{cursor:pointer;background:none;border:1px solid #ddd;border-radius:6px;padding:7px 8px;display:flex;flex-direction:column;gap:4px;transition:background .2s}
#hamburger-btn:hover{background:#f5f5f5}
#hamburger-btn span{display:block;width:20px;height:2px;background:#444;border-radius:2px}
#font-menu{display:none;position:absolute;top:56px;right:14px;background:#fff;border:1px solid #ddd;border-radius:10px;padding:16px 20px;box-shadow:0 6px 20px rgba(0,0,0,.13);z-index:200;min-width:240px}
#font-menu.open{display:block}
#font-menu h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:12px}
.fm-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:13px;color:#444}
.fm-ctrl{display:flex;align-items:center;gap:6px}
.fm-btn{width:30px;height:30px;border-radius:6px;border:1px solid #ccc;background:#f5f5f5;cursor:pointer;font-size:16px;font-weight:bold;display:flex;align-items:center;justify-content:center}
.fm-btn:hover{background:#e0e0e0}
.fm-size{font-size:13px;font-weight:bold;width:36px;text-align:center;color:#333}

/* ── PROGRESS BAR ── */
#pb-wrap{height:5px;background:#e8e8e8;flex-shrink:0}
#pb{height:100%;background:linear-gradient(90deg,#c41230,#e53935);width:0%;transition:width .35s ease}

/* ── MAIN SPLIT ── */
#main{flex:1;display:flex;overflow:hidden;min-height:0}
#pass-pane{width:50%;overflow-y:auto;padding:28px 30px;min-width:180px;background:#fff;border-right:1px solid #e0e0e0}
#divider{width:7px;background:#e8e8e8;cursor:col-resize;flex-shrink:0;transition:background .2s;position:relative}
#divider:hover,#divider.dragging{background:#c41230}
#divider::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:3px;height:36px;background:rgba(0,0,0,.15);border-radius:3px}
#q-pane{flex:1;overflow-y:auto;padding:24px 28px;min-width:180px;background:#fafafa}

/* ── PASSAGE ── */
.p-title{font-size:20px;font-weight:800;margin-bottom:4px;color:#111;line-height:1.3}
.p-sub{font-size:13px;font-style:italic;color:#444;margin-bottom:18px;line-height:1.5;background:#fff8e1;padding:8px 12px;border-left:3px solid #f9a825;border-radius:0 4px 4px 0}
.p-body p{margin-bottom:14px;line-height:1.75;color:#222;text-align:justify}
.p-body p .pl{font-weight:800;color:#c41230;margin-right:5px;font-size:.9em}
.highlight{background:#ffe566;border-radius:2px;cursor:pointer;padding:1px 0}
.highlight:hover{background:#ffd600}
#hi-pill{position:fixed;background:#222;color:#fff;border-radius:20px;padding:6px 16px;font-size:13px;cursor:pointer;z-index:300;box-shadow:0 3px 10px rgba(0,0,0,.25);display:none;white-space:nowrap}
#hi-pill:hover{transform:scale(1.04)}

/* ── QUESTIONS ── */
.qs-header{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#c41230;border-bottom:2px solid #c41230;padding-bottom:6px;margin-bottom:16px}
.q-instr{background:#fff4f5;border-left:3px solid #c41230;padding:10px 14px;border-radius:0 6px 6px 0;margin-bottom:16px;font-size:13px;line-height:1.6;color:#333}
.q-instr strong{font-weight:700;color:#111}
.q-item{margin-bottom:18px}
.q-num{font-weight:800;font-size:14px;color:#111;display:inline-block;min-width:24px}
.q-text{font-size:13px;color:#222;margin-top:3px;line-height:1.55}
.rg{display:flex;gap:0;margin-top:8px;flex-wrap:wrap}
.rg label{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid #ccc;padding:6px 13px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;border-right:none;color:#444}
.rg label:first-child{border-radius:6px 0 0 6px}
.rg label:last-child{border-radius:0 6px 6px 0;border-right:1px solid #ccc}
.rg label:hover{background:#fde8ec;border-color:#c41230;color:#c41230;z-index:1}
.rg input[type=radio]{accent-color:#c41230;width:13px;height:13px}
.rg label.sel{background:#c41230;color:#fff;border-color:#c41230;font-weight:700}
.mcq-g{margin-top:8px}
.mcq-g label{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;margin-bottom:3px;cursor:pointer;border-radius:6px;font-size:13px;line-height:1.45;border:1px solid transparent;transition:all .15s;color:#333}
.mcq-g label:hover{background:#fff;border-color:#ddd}
.mcq-g label.sel{background:#fde8ec;border-color:#c41230;color:#c41230}
.mcq-g .ol{font-weight:800;flex-shrink:0;margin-top:1px;min-width:18px}
.mcq-g input[type=radio]{display:none}

/* ── NOTES BOX ── */
.notes-box{border:2px solid #888;border-radius:6px;padding:18px 22px;margin-bottom:18px;font-size:13px;line-height:2.1;background:#fff}
.notes-box .nb-title{font-weight:800;font-size:15px;text-align:center;margin-bottom:14px;color:#111}
.nb-sub{font-weight:700;margin:12px 0 4px;color:#333;font-size:13px;text-decoration:underline}
.nb-ul{list-style:none;padding-left:14px;margin-bottom:6px}
.nb-ul>li{margin-bottom:3px}
.nb-ul>li::before{content:"• ";color:#c41230;font-weight:700}
.ii{border:none;border-bottom:2px solid #c41230;padding:1px 4px;font-size:13px;outline:none;font-family:Arial,Helvetica,sans-serif;background:transparent;color:#111}

.qn-lbl{font-weight:800;font-size:11px;color:#c41230;margin-right:1px}

/* ── SUMMARY PROSE ── */
.sum-box{background:#fff;border:1px solid #ddd;border-radius:8px;padding:18px 22px;margin-bottom:18px;font-size:13px;line-height:2.4}
.sum-box p{margin-bottom:10px}

.match-box{border:2px solid #888;border-radius:6px;padding:14px 18px;margin-bottom:14px;font-size:13px;background:#fff}
.match-box .mi{margin-bottom:7px;line-height:1.5}
.match-box .ml{font-weight:800;color:#c41230;margin-right:6px}

.comp-table{width:100%;border-collapse:collapse;font-size:12.5px;margin:10px 0 18px}

const PASSAGES = {
  1: {
    title: `The National Parks of America`,
    sub: null,
    html: `
<p><span class="pl">A</span>America's national parks are one of the country's most remarkable and influential initiatives. The concept of the national park originated in America, though it was quickly replicated by similar parks in Canada, Finland, New Zealand, Australia and elsewhere. The first American national park was Yellowstone, created in 1872. Yellowstone comprises some 3,500 square miles of wilderness and today attracts more than four million visitors a year. Since 1872, nearly 60 additional national parks have been established in the USA, incorporating almost every type of natural environment, from mountains to deserts, lakes, rivers and coastlines. They are administered by the National Parks Service (NPS), which also manages significant monuments and historic structures such as the Statue of Liberty, the Gettysburg Museum and Ford's Theatre, where President Lincoln was assassinated.</p>
<p><span class="pl">B</span>The creation of the national parks came in response to a growing attachment to the natural world that was developing in American society. In 1832, the painter George Catlin dreamed of creating 'a nation's park' to preserve the grasslands in the state of South Dakota. Catlin failed to see such a park established in his lifetime, but his vision lived on. Four years later the writer Ralph Waldo Emerson published an important essay entitled 'Nature' in which he argued that natural landscapes should be protected rather than exploited for agriculture and commerce. The campaigner Frederick Olmsted went further, claiming that every American, not only the wealthy and powerful, had the right to access places of natural beauty. The creation of a public park in the Yosemite Valley was directly the result of his work.</p>
<p><span class="pl">C</span>The development of the national parks was a process that continued through the late 19th century and the early 20th century. The establishment of the first park at Yellowstone in 1872 was perhaps the defining moment in this process. The Yellowstone national park not only preserved the headwaters of the Mississippi, Colorado and Snake rivers, but also provided a sanctuary for countless endangered species by imposing a ban on hunting in all its forms. Today such an initiative would be commonplace but in these earliest days of the conservation movement, many Americans still regarded it as their right to shoot or trap wild animals.</p>
<p><span class="pl">D</span>Yellowstone was followed by Sequoia (1890), Mount Rainier (1899), Crater Lake (1902) and Wind Cave (1903), among many other parks. But while the creation of additional parks enjoyed wide popular support, there were frequent disagreements about their purpose. For some, the primary goal was the protection of the natural world, while for others the parks were about providing public access to nature. These two goals were at times contradictory and led to a variety of competing voices and factions. In recognition of the difficulties of running these vast wilderness areas, their management was for many years placed in the hands of the military, rather than the federal or state government.</p>
<p><span class="pl">E</span>The late 19th century was also a time when railroads were being constructed across America. Increasingly, these ran through even the most remote areas, where many parks were located, making tourism possible in these locations for the very first time. While this was welcomed by many park supporters, others were concerned that visitors should appreciate the parks in particular ways. Nathaniel Langford was instrumental in setting up Yellowstone and saw the park as an ideal opportunity for the education of ordinary citizens in all aspects of the natural world and environmental conservation, which was his number one priority.</p>
<p><span class="pl">F</span>In the early 20th century, the first really significant development was the setting up of the NPS in 1916. Now for the first time a single body was charged with administering the network and managing the numerous groups and interests that had a stake in it. Stephen Mather was appointed as the first Superintendent of Parks and under his leadership seven new parks were established, including Grand Canyon, Hawaii and Mount McKinley. However, arguably even more important was Mather's transformation of the hitherto poorly managed finances of the parks.</p>
<p><span class="pl">G</span>The NPS generally saw the primary role of the parks as being environmental protection. For this reason, most human activities were regulated — farming and forestry were certainly not allowed. However, the controversial decision to permit the construction of dams in national parks was made on the basis that the resulting supplies of water and hydroelectric power would be in the public interest. Certainly, visitor numbers were unaffected as park admissions increased every year. Then in the 1930s the number of visitors expanded dramatically, largely because mass-produced automobiles became affordable, allowing ever more city-dwellers to reach the park network. With this, the national parks assumed a pre-eminent position in the social fabric of America, a legacy that continues to the present day.</p>`

  2: {
    title: `Children's comprehension of television advertising`,
    sub: null,
    html: `
<p><span class="pl">A</span>In 1874, long before the advent of television, the English Parliament passed a law to protect children 'from their own lack of experience and from the wiles of pushing tradesmen and moneylenders' (James, 1965). The act is one of the earliest governmental policies to address children's vulnerability to commercial exploitation and was produced before major corporations earned huge profits by marketing products directly to children. Yet the issues underlying this 19th-century policy remain much the same in the 21st century.</p>
<p><span class="pl">B</span>Television has long been the predominant medium that advertisers have chosen for marketing products to children. It is estimated that the average child sees more than 40,000 television commercials a year, most of which are 15 to 30 seconds in length (Kunkel, 2001). According to another estimate, children aged 14 years and under make $424 billion in direct purchases and influence $4190 billion in family purchases, underscoring the high stakes involved (McNeal, 1998). In addition, companies now recognize that brand loyalty built at an early age may reap economic rewards over a child's lifetime (McNeal, 1987).</p>
<p><span class="pl">C</span>A number of factors have contributed to an unprecedented growth in both the amount and type of advertising directed at children. First and foremost among these are changes in the media environment. In decades past, television programming targeted at children was limited and relegated to time slots unpopular with their parents, such as Saturday mornings (Turow, 1981). Today, the number of channels received in the average US home has escalated with the diffusion of cable television and satellite technologies. In this new multichannel era, there are numerous national program services devoted exclusively to children. Naturally, these channels deliver significant amounts of child-oriented marketing messages. Although parents may be pleased that their youngsters can now watch children's programming at any hour of the day they may not recognize that such viewing opportunities entail much greater exposure to advertising than any previous generation of youth has experienced.</p>
<p><span class="pl">D</span>Approximately 80% of all advertising targeted at children falls within four product categories: toys, cereals, candies, and fast-food restaurants (Kunkel et al, 1992). Commercials are highly effective at employing specific features designed to attract children's attention. For example, they use the strategy of introducing unique sound effects and rapidly moving images (Greer et al, 1982). The other most common persuasive strategy employed in advertising to children is to associate product with playfulness and happiness, rather than to provide any actual product-related information (Kunkel et al, 1992). For example, a commercial featuring Ronald McDonald dancing, singing and smiling in McDonald's restaurants without any mention of the actual food products available reflects a playful or happy theme. This strategy is also found frequently with cereal ads, which often include cartoon characters to help children identify the product. In contrast, most commercials fail to mention even the major grain used in each cereal.</p>
<p><span class="pl">E</span>Another common feature of advertising to children is the use of product disclosures such as 'batteries not included' or 'each part sold separately'. Studies make clear that young children do not comprehend the intended meaning of these disclaimers. For example, fewer than one in four kindergarten through second grade children could grasp the meaning of 'some assembly required' in a commercial. In contrast, the use of child-friendly language such as 'you have to put it together' more than doubled the proportion of children who understood the qualifying message (Liebert et al, 1977). The phrase 'part of a balanced breakfast' is also a frequent disclosure included in most cereal ads to combat the concern that sugared cereal holds little nutritional value for children. Research shows that most children below age 7 years have no idea what the term 'balanced breakfast' means (Palmer &amp; McDowell, 1981). Rather than informing young viewers about the importance of a nutritious breakfast, this common disclaimer actually leaves many children with the misimpression that cereal alone is sufficient for a meal. This pattern of employing creative terminology in advertising content so as to obscure certain information that might be unhelpful to the sponsor is a long-standing practice that often misleads the consumer (Geis, 1982).</p>
<p><span class="pl">F</span>Very young children do not recognize that there are two fundamentally different categories of television content: programs and commercials. Most children below the age of 4 or 5 exhibit low awareness of the concept of commercials, frequently explaining them as if they were a scene in the program itself. Once this confusion diminishes, children first recognize the difference between programs and commercials based on either affective ('commercials are funnier than TV programs') or perceptual ('commercials are short and programs are long') cues (Blatt et al, 1972).</p>
<p><span class="pl">G</span>Although most children's programs indicate that a commercial break is coming (e.g. by saying 'We'll be right back after these messages'), research reveals that these 'separators' generally do not help children to recognize advertising content (Palmer &amp; McDowell, 1979). This likely occurs because they are not perceptually distinct from the adjacent programming that surrounds them; in fact, many separators feature characters that appear in the same show that the commercial has just interrupted. When an ad includes one of the characters featured in a program, this is known as host-selling. This type of advertising makes the task of discriminating between program and commercial content particularly difficult for young children (Kunkel, 1988) and is thus restricted in the US by the Federal Communications Commission during children's programs.</p>
<p><span class="pl">H</span>In sum, because young children lack the cognitive skills and abilities of older children and adults, they do not comprehend commercial messages in the same way as more mature audiences, and are therefore uniquely susceptible to advertising influence.</p>`
  },
  3: {
    title: `Business Innovation`,
    sub: `As new 'wonder products' are getting harder and harder to find, what should companies do to survive in today's ever more competitive markets?`,
    html: `
<p><span class="pl">A</span>The Oxford English Dictionary defines innovation as 'making changes to something established'. Invention, by contrast, is the act of 'coming upon or finding; discovery'. Revolutionary 'inventions' of 20th-century US firms include, for example, the safety razor, the hydraulic brake, and DNA fingerprinting. However, as Adrian Slywotsky of Mercer Management Consulting says, 'In most industries, truly differentiating new-product breakthroughs are becoming increasingly rare'. And as 'blockbuster' novel products become steadily more elusive, big companies would do well to focus instead on making lots of small things better.</p>
<p><span class="pl">B</span>Unfortunately, big companies often have big problems with innovation. 'Innovators try to change the status quo', says Bhaskar Chakravorti of the Monitor Group, 'which is why markets tend to resist them'. Innovations frequently disrupt the way companies do things (and may have been doing them for years). And it is not just markets that are nervous of innovation. Michael Hammer, co-author of 'Re-engineering the Corporation', cites the case of a PC-maker that set out to imitate Dell's famous 'Build to Order' system of computer assembly. The company found its attempts were frustrated by both its head of manufacturing, who feared for his job, and its head of marketing, who did not want to upset his existing retail outlets. So the proposal got nowhere, and Dell continued to dominate the business.</p>
<p><span class="pl">C</span>Clayton Christensen, a Harvard Business School Professor, describes how disruptive innovations — simpler, cheaper and more convenient products that seriously upset the status quo — often herald the rapid downfall of thriving, long-standing businesses. This, it is widely recognised, is because most such organisations are designed to grow through a series of sustaining innovations — the sort which simply improve on existing products for existing markets.</p>
<p><span class="pl">D</span>William Baumol, professor at New York University, argues that large companies have been learning important lessons from the history of innovation. Most have both cut back and redirected their Research and Development spending in recent years. Innovation by big companies is now based less on the discoveries of white-coated scientists, and more on incremental improvements in the processes that constitute daily operations.</p>
<p><span class="pl">E</span>According to marketing specialist Vijay Vishwanath, companies also need to adjust to the ongoing fragmentation of markets. Once-uniform mass markets are breaking up into countless 'niches', in which everything has to be customised for a small group of consumers. Looking for blockbusters in such a world is a daunting task. Another problem, according to Chakravorti, lies in the marketing of innovations. Too many executives are still stuck with the strategies used to sell Kodak's first camera 120 years ago, when the product was so revolutionary that the company could forget about competition for at least a decade. Today, rival products can be rushed onto the market at speeds which would have been unimaginable in those days.</p>
<p><span class="pl">F</span>Companies that fail to come up with headline-hitting new products should not despair. 'There are plenty of other, albeit less glamorous, areas where innovation can take place,' says Erik Brynjolfsson of the MIT Sloan School of Management. He claims that the roots of the USA's productivity surge originate in 'a genuine revolution in how American companies are using information technology to reinvent their business processes from top to bottom'.</p>
<p><span class="pl">G</span>Hammer highlights several instances where firms have added considerably to their shareholder value through what he calls operational innovations — creativity in their business processes. Notable among these is the American retail giant Wal-Mart. While superficially mundane, their pioneering idea of 'cross-docking' — shifting merchandise off trucks from suppliers and straight onto trucks heading for stores — has been fundamental to the company's ability to offer low prices, the platform for its outstanding success.</p>
<p><span class="pl">H</span>Companies are also being encouraged to embrace strategic innovations, following the example of such firms as Southwest Airlines, a low-cost American regional carrier, whose creative strategies and shrewd timing won it a victory over its ailing competitor US Airways. The Swedish packaging company Tetra Pak also used this style of innovation, by moving away from delivering ready-made containers for customers into providing machinery and supplying dedicated materials for them to make their own packaging. This strips out many costs from the process, and also makes it very difficult for the customer to switch suppliers. Like Southwest Airlines, they achieved success through strategic innovations alone, with little innovation in either the underlying technology or the product sold.</p>
<p><span class="pl">I</span>In his book 'How to Grow When Markets Don't', Slywotsky and his co-author Richard Wise recommend what they call demand innovations. A few far-sighted organisations such as the French industrial gas company Air Liquide have found success not — as in the case of strategic innovations — by meeting existing demand in a new way, but by discovering new forms of demand and adapting to supply the products or services required. Air Liquide had been a leading supplier of industrial gases until the early 1990s, when gas became a commodity and their operational income plunged. Realising the value of the skills they had gained over the decades, the company became a supplier not only of gas, but also of the management services to accompany it. Within a short time their profits rose again.</p>
<p><span class="pl">J</span>There are certain things that managers can do to make innovations like these happen within their organisations. For example, projects with potential should be rapidly hived off into independent business units, away from the smothering influence of the status quo. The ultimate outcome of any one innovation may still be unpredictable, the process from which it emerges is not.</p>`
  }

  if(!sel||sel.isCollapsed||!sel.toString().trim()){hpill.style.display='none';return;}
  const r=sel.getRangeAt(0);
  if(!pp.contains(r.commonAncestorContainer)&&!qpane.contains(r.commonAncestorContainer)){hpill.style.display='none';return;}
  selRange=r;
  const rect=r.getBoundingClientRect();
  const top=rect.top<50?rect.bottom+6:rect.top-42;
  hpill.style.left=Math.max(6,rect.left+rect.width/2-60)+'px';
  hpill.style.top=top+'px';
  hpill.style.display='block';
}

function doHighlight() {
  if(!selRange) return;
  try{const span=document.createElement('span');span.className='highlight';selRange.surroundContents(span);}catch(e){}
  hpill.style.display='none';
  window.getSelection()?.removeAllRanges();
  selRange=null;
}

document.addEventListener('mousedown',e=>{
  if(!e.target.closest('#hi-pill')) hpill.style.display='none';
});

// ═══════════════════════════════════════════════════════════
// DRAG DIVIDER
// ═══════════════════════════════════════════════════════════
(()=>{
  const div=document.getElementById('divider');
  const left=document.getElementById('pass-pane');
  const main=document.getElementById('main');
  let drag=false,sx,sw2;
  div.addEventListener('mousedown',e=>{drag=true;sx=e.clientX;sw2=left.getBoundingClientRect().width;div.classList.add('dragging');document.body.style.cursor='col-resize';document.body.style.userSelect='none';});
  document.addEventListener('mousemove',e=>{if(!drag)return;const mw=main.getBoundingClientRect().width;left.style.width=Math.max(180,Math.min(mw-200,sw2+(e.clientX-sx)))+'px';});
  document.addEventListener('mouseup',()=>{if(drag){drag=false;div.classList.remove('dragging');document.body.style.cursor='';document.body.style.userSelect='';}});
})();

// ═══════════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════════
function chkAns(q) {
  const ua=ANS[q], ca=AK[q];
  if(!ua||!ca) return false;
  const u=ua.toString().trim().toLowerCase();
  const c=ca.toString().trim().toLowerCase();
  if(u===c) return true;
  if(ALT[q]) return ALT[q].some(a=>a.toLowerCase()===u);
  return false;
}

function dispAK(q) {
  const a=AK[q]; if(!a) return '—';
  const s=a.toString();
  const fills=[7,8,9,10,11,12,13,23,24,25,26,36,37,38,39,40];
  if(fills.includes(q)) return s.charAt(0).toUpperCase()+s.slice(1);
  return s.toUpperCase();
}

function dispUA(q) {
  const ua=ANS[q];
  if(!ua) return '<em style="color:#aaa">No answer</em>';
  return ua;
}

function bandScore(n) {
  if(n>=39)return'9.0';if(n>=37)return'8.5';if(n>=35)return'8.0';
  if(n>=33)return'7.5';if(n>=30)return'7.0';if(n>=27)return'6.5';
  if(n>=23)return'6.0';if(n>=19)return'5.5';if(n>=15)return'5.0';
  if(n>=13)return'4.5';return'4.0';
}

function showResults() {
  let total=0;
  for(let q=1;q<=40;q++) if(chkAns(q)) total++;
  const pct=Math.round(total/40*100), band=bandScore(total);

  let html=`<div class="rm-head"><h2>📋 Results — IELTS Reading Full Test</h2></div>`;
  html+=`<div class="total-strip"><div class="ts-score">${total} / 40</div><div class="ts-band">Score: ${pct}% &nbsp;·&nbsp; Estimated Band Score: <strong>${band}</strong></div></div>`;

  for(let p=1;p<=3;p++) {
    const [s,e]=pRanges[p];
    let pc=0;
    for(let q=s;q<=e;q++) if(chkAns(q)) pc++;
    const pt=e-s+1, pp2=Math.round(pc/pt*100);
    const bc=pp2>=70?'sb-g':pp2>=50?'sb-o':'sb-r';
    html+=`<div class="pr-section"><div class="pr-hdr"><h3>Passage ${p}: ${pTitles[p]} <small style="color:#888;font-size:12px">&nbsp;(Q${s}–Q${e})</small></h3><span class="s-badge ${bc}">${pc}/${pt} (${pp2}%)</span></div><table class="rt"><thead><tr><th>Q#</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th></tr></thead><tbody>`;
    for(let q=s;q<=e;q++) {
      const ok=chkAns(q);
      html+=`<tr class="${ok?'cr':'wr'}"><td><strong>${q}</strong></td><td>${dispUA(q)}</td><td>${dispAK(q)}</td><td>${ok?'<span class="ck">✓</span>':'<span class="cx">✗</span>'}</td></tr>`;
    }
    html+=`</tbody></table></div>`;
  }

  html+=`<button id="close-res" onclick="closeRes()">✕ Close Results</button>`;
  document.getElementById('res-modal').innerHTML=html;
  document.getElementById('res-overlay').classList.add('open');
}

function closeRes() { document.getElementById('res-overlay').classList.remove('open'); }

<script>
/* ── EXAM TIMER JS ── */
(function(){
  const SECS=3600,_t0=Date.now(),_el=document.getElementById('examTimer');
  function _tick(){
    const rem=SECS-Math.floor((Date.now()-_t0)/1000);
    if(rem<=0){_el.textContent='00:00';_el.classList.add('warn');
      const ov=document.querySelector('#res-overlay');
      if(!ov||!ov.classList.contains('open'))showResults();return;}
    _el.textContent=String(Math.floor(rem/60)).padStart(2,'0')+':'+String(rem%60).padStart(2,'0');
    _el.classList.toggle('warn',rem<=300);setTimeout(_tick,500);
  }
  _tick();
})();
</script>
