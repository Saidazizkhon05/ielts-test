<style>

  .hamburger:hover{background:#f0f0f0}
  .hamburger span{display:block;width:18px;height:2px;background:#333;border-radius:1px}
  .menu-panel{

  .progress{height:3px;background:#eee;flex:0 0 3px}

  .main{flex:1 1 auto;display:flex;overflow:hidden;min-height:0}
  .pane{overflow-y:auto;padding:24px 28px 40px;min-width:200px}

<script>
/* ============================================================
   HELPERS
============================================================ */
function escapeAttr(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function blank(n){
  return `<span class="q-blank"><span class="q-blank-num">${n}</span><input class="q-input" data-q="${n}" autocomplete="off" spellcheck="false"></span>`;
}
function displayAnswer(v){
  if (!v && v!==0) return '—';
  if (v==='T') return 'TRUE'; if (v==='F') return 'FALSE';
  if (v==='Y') return 'YES'; if (v==='N') return 'NO';
  if (v==='NGV') return 'NOT GIVEN';
  return v;
}
function normalize(s){ return String(s).trim().toLowerCase().replace(/\s+/g,' '); }
function checkAnswer(user, correct){
  if (!user) return false;
  return (Array.isArray(correct)?correct:[correct]).some(c=>normalize(c)===normalize(user));
}
function displayCorrect(c){ return displayAnswer(Array.isArray(c)?c[0]:c); }

/* A-L word list options for Q27-32 */

/* ============================================================
   PASSAGES
============================================================ */
const PASSAGES = {
  1: `
    <h1 class="pass-title">The history of the Pencil</h1>
    <div class="pass-sub">&nbsp;</div>
    <div class="pass-body">
      <p>The history of the pencil starts with a violent thunderstorm. When some particularly ferocious weather struck the Lake District in North West England in the sixteenth century, locals in the village of Borrowdale discovered a large uprooted tree. Underneath the tree lay an unknown black substance which we now know as graphite. It was slightly shiny and smooth to the touch. And it left a black smear on the hands of all who touched it.</p>
      <p>Initially, the local farmers used the newly discovered material as a handy way to identify their sheep. However, others quickly realised the potential for using this intriguing substance to write on paper. When it was untreated the material was very soft, which meant that it was messy to handle. To make it fit for use with paper, people enclosed a thin core of the substance in stiff sheep hides or rope. At this time chemistry was still in its infancy. People searched for a word to describe this increasingly useful substance and came up with plumbago which, in Latin, means acts or writes like lead. Later the name was changed to graphite. But because words have remarkable staying power, we still call graphite the lead of a pencil even though it is now known that there is no trace of real lead in graphite.</p>
      <p>Graphite has a very high melting point at around 3,500 degrees Celsius. This made it invaluable to the British army and navy as a secret ingredient in the manufacture of cannon balls. The Royal Ordnance, or weaponry section of the British armed forces, used graphite as a lining inside the moulds for cannon balls, which as a result the British could turn out faster and more cheaply than their European rivals. In addition to its value to the armed forces, the government quickly realised the commercial potential of the graphite at Borrowdale, and assumed control of all the mines there during the sixteenth century. Armed guards accompanied the precious graphite all the way down to the metal foundries by the naval shipyards in the south of England. The graphite was so valuable that the locals, who called it wadd, started to steal it. As a deterrent, an act of parliament in 1752 made this offence punishable by time in prison.</p>
      <p>The Italians originally invented the wooden casing to hold a thin rod of plumbago firmly in place for ease of writing. Italian craftsmen hollowed out two small sections of cedar wood, into one of which they laid the lead. They then glued the other section over the top and left the two halves to set. When dry, the whole apparatus formed what today we know as a pencil. The Germans took this technique and developed it further by applying mass-production techniques to pencils. At the same time Nicolas-Jacques Conte, a French officer in Napoleon Bonaparte's army during the late 1700s, developed a method of mixing powdered graphite and clay together for firming in a kiln. Adding more clay to the mixture helped make the pencil harder, sharper, and more precise in its mark. More graphite helped make a pencil mark that was softer, thicker and darker.</p>
      <p>The varying quality of pencil leads eventually gave rise to a system for categorizing the fineness of the pencil mark. Pencil manufacturers all over the world still use this so-called HB grading system today. The H stands for the Hardness of the pencil while the B stands for its Blackness. An HB pencil is a standard pencil and a variety of letters and numbers are used to designate different types of lead.</p>
      <p>Significant seams of graphite exist in parts of China, which now produces most of the world's pencils. Interestingly, the Borrowdale mine in the Lake District remains the only significant source of graphite in its near-pure form in the world. Nowadays the highest grade of graphite at Borrowdale is totally exhausted, although other grades can still be found, and England's pencil industry continues to thrive in the nearby town of Keswick.</p>

  questionPane.querySelectorAll('select.q-select[data-q]').forEach(sel=>{
    const cur=state.answers[sel.dataset.q];
    if(cur&&!sel.value){sel.value=cur;sel.classList.add('has-value');}
  });
}

function attachQuestionListeners(){
  questionPane.querySelectorAll('input[type="radio"]').forEach(r=>{
    r.addEventListener('change',e=>{
      const key=e.target.name.substring(1);
      state.answers[key]=e.target.value;
      questionPane.querySelectorAll(`input[name="${e.target.name}"]`).forEach(rr=>
        rr.closest('.opt-label').classList.toggle('selected',rr.checked));
      updateNav();updateProgress();
    });
  });
  questionPane.querySelectorAll('input.q-input[data-q]').forEach(inp=>{
    inp.addEventListener('input',e=>{
      const key=e.target.dataset.q;
      const v=e.target.value.trim();
      if(v) state.answers[key]=e.target.value; else delete state.answers[key];
      e.target.classList.toggle('has-value',!!v);
      updateNav();updateProgress();
    });
  });
  questionPane.querySelectorAll('select.q-select[data-q]').forEach(sel=>{
    sel.addEventListener('change',e=>{
      const key=e.target.dataset.q;
      const v=e.target.value;
      if(v) state.answers[key]=v; else delete state.answers[key];
      e.target.classList.toggle('has-value',!!v);
      updateNav();updateProgress();
    });
  });
}

/* ============================================================
   NAV
============================================================ */
function renderNav(){
  let html='';
  [1,2,3].forEach((p,i)=>{
    if(i>0) html+=`<div class="nav-sep"></div>`;
    const [first,last]=pRanges[p];
    if(p===state.activePassage){
      html+=`<span class="nav-pass active" data-pass="${p}">Passage ${p}</span>`;
      for(let q=first;q<=last;q++){
        const ans=state.answers[q];
        html+=`<button class="q-pill ${ans?'answered':''}" data-q="${q}">${q}</button>`;
      }
    } else {
      const total=last-first+1;
      let answered=0;
      for(let q=first;q<=last;q++) if(state.answers[q]) answered++;
      html+=`<span class="nav-pass" data-pass="${p}">Passage ${p} <small>(${answered} of ${total} answered)</small></span>`;
    }
  });
  html+=`<div class="nav-spacer"></div><button class="submit-btn" id="submitBtn">✓ Submit</button>`;
  bottomNav.innerHTML=html;
  bottomNav.querySelectorAll('.q-pill').forEach(pill=>{
    pill.addEventListener('click',()=>{
      const q=pill.dataset.q;
      const el=document.getElementById('q-'+q)||questionPane.querySelector(`[data-q="${q}"]`);
      if(el){
        el.scrollIntoView({behavior:'smooth',block:'center'});
        if(el.tagName==='INPUT'||el.tagName==='SELECT') setTimeout(()=>el.focus(),320);
        else{el.style.transition='background .3s';el.style.background='#fffbe5';setTimeout(()=>el.style.background='',700);}
      }
    });
  });
  bottomNav.querySelectorAll('.nav-pass').forEach(l=>{
    l.addEventListener('click',()=>{
      const p=parseInt(l.dataset.pass,10);
      if(p!==state.activePassage){
        state.activePassage=p;renderPassage();renderQuestions();renderNav();
        passagePane.scrollTop=0;questionPane.scrollTop=0;
      }
    });
  });
  document.getElementById('submitBtn').addEventListener('click',showResults);
}
function updateNav(){renderNav();}
function updateProgress(){
  progressFill.style.width=(Object.keys(state.answers).length/TOTAL_Q*100)+'%';
}

/* ============================================================
   HIGHLIGHT
============================================================ */
passagePane.addEventListener('mouseup',()=>{
  setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed){hlPill.style.display='none';return;}
    const range=sel.getRangeAt(0);
    if(!passagePane.contains(range.commonAncestorContainer)){hlPill.style.display='none';return;}
    if(!range.toString().trim()){hlPill.style.display='none';return;}
    const rect=range.getBoundingClientRect();
    hlPill.style.display='block';
    const pw=hlPill.offsetWidth,ph=hlPill.offsetHeight;
    let left=rect.left+rect.width/2-pw/2,top=rect.top-ph-8;
    if(top<8) top=rect.bottom+8;
    left=Math.max(8,Math.min(left,window.innerWidth-pw-8));
    hlPill.style.left=left+'px';hlPill.style.top=top+'px';
  },0);
});
hlPill.addEventListener('mousedown',e=>{
  e.preventDefault();
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed) return;
  const range=sel.getRangeAt(0);
  if(!passagePane.contains(range.commonAncestorContainer)) return;
  try{const span=document.createElement('span');span.className='highlight';span.appendChild(range.extractContents());range.insertNode(span);sel.removeAllRanges();}catch(e){}
  hlPill.style.display='none';
});
passagePane.addEventListener('click',e=>{
  if(e.target.classList&&e.target.classList.contains('highlight')){
    const s=e.target,p=s.parentNode;
    while(s.firstChild) p.insertBefore(s.firstChild,s);
    p.removeChild(s);p.normalize();
  }
});
document.addEventListener('mousedown',e=>{
  if(e.target!==hlPill&&!passagePane.contains(e.target)) hlPill.style.display='none';
});

/* ============================================================
   DIVIDER DRAG
============================================================ */
const divider=document.getElementById('divider');
const mainEl=document.querySelector('.main');
let dragging=false;
divider.addEventListener('mousedown',e=>{dragging=true;divider.classList.add('dragging');document.body.classList.add('dragging');e.preventDefault();});
document.addEventListener('mousemove',e=>{
  if(!dragging) return;
  const rect=mainEl.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width*100;
  if(pct>=20&&pct<=80){passagePane.style.flex=`0 0 ${pct}%`;passagePane.style.width=`${pct}%`;}
});
document.addEventListener('mouseup',()=>{if(dragging){dragging=false;divider.classList.remove('dragging');document.body.classList.remove('dragging');}});

/* ============================================================
   MENU + FONT
============================================================ */
const hamburger=document.getElementById('hamburger');
const menuPanel=document.getElementById('menuPanel');
hamburger.addEventListener('click',e=>{e.stopPropagation();menuPanel.classList.toggle('open');});
document.addEventListener('click',e=>{
  if(!menuPanel.contains(e.target)&&e.target!==hamburger&&!hamburger.contains(e.target)) menuPanel.classList.remove('open');
});
document.querySelectorAll('.size-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const target=btn.dataset.target,dir=parseInt(btn.dataset.dir,10);
    if(target==='passage'){
      state.passageSize=Math.min(22,Math.max(10,state.passageSize+dir));
      passagePane.style.fontSize=state.passageSize+'px';
      document.getElementById('passSizeVal').textContent=state.passageSize+'px';
    } else {
      state.questionSize=Math.min(22,Math.max(10,state.questionSize+dir));
      questionPane.style.fontSize=state.questionSize+'px';
      document.getElementById('qSizeVal').textContent=state.questionSize+'px';
    }
  });
});

/* ============================================================
   RESULTS
============================================================ */
function bandFromCorrect(n){
  if(n>=39)return 9.0;if(n>=37)return 8.5;if(n>=35)return 8.0;
  if(n>=33)return 7.5;if(n>=30)return 7.0;if(n>=27)return 6.5;
  if(n>=23)return 6.0;if(n>=19)return 5.5;if(n>=15)return 5.0;
  if(n>=13)return 4.5;return 4.0;
}
function showResults(){
  let totalCorrect=0,html='';
  [1,2,3].forEach(p=>{
    const [first,last]=pRanges[p];
    let correct=0,rows='';
    for(let q=first;q<=last;q++){
      const u=state.answers[q],c=AK[q];
      const ok=checkAnswer(u,c);
      if(ok) correct++;
      rows+=`<tr class="${ok?'row-correct':'row-wrong'}">
        <td><strong>${q}</strong></td>
        <td>${u!==undefined&&u!==''?displayAnswer(u):'<em style="color:#999">—</em>'}</td>
        <td>${displayCorrect(c)}</td>
        <td class="mark ${ok?'mark-ok':'mark-x'}">${ok?'✓':'✗'}</td>
      </tr>`;
    }
    totalCorrect+=correct;
    const total=last-first+1,pct=correct/total*100;
    const badge=pct>=70?'badge-green':pct>=50?'badge-orange':'badge-red';
    html+=`<div class="result-pass">
      <div class="result-pass-header">
        <div class="result-pass-info">
          <div class="result-pass-title">Passage ${p}: ${PASSAGE_TITLES[p]}</div>
          <div class="result-pass-sub">Questions ${first}–${last}</div>
        </div>
        <div class="score-badge ${badge}">${correct} / ${total}</div>
      </div>
      <table class="result-table">
        <thead><tr><th>Q#</th><th>Your Answer</th><th>Correct Answer</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });
  const band=bandFromCorrect(totalCorrect);
  html+=`<div class="total-strip">
    <div class="total-block"><div class="total-label">Score</div><div class="total-value">${totalCorrect} / ${TOTAL_Q}</div></div>
    <div class="total-block"><div class="total-label">Accuracy</div><div class="total-value">${(totalCorrect/TOTAL_Q*100).toFixed(0)}%</div></div>
    <div class="total-block"><div class="total-label">Estimated Band</div><div class="total-value total-band-value">${band.toFixed(1)}</div></div>
  </div>`;
  document.getElementById('resultsBody').innerHTML=html;
  document.getElementById('modal').classList.add('open');
}
document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modal').classList.remove('open'));
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')document.getElementById('modal').classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal').classList.remove('open');});

/* INIT */
renderPassage();renderQuestions();renderNav();updateProgress();
</script>
</body>
</html>
