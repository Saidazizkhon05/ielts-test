    title: `Book review: <em>Triumph of the City</em>`,
    sub: null,
    html: `
<p><span class="pl">A</span><em>Triumph of the City</em>, by Edward Glaeser, is a thrilling and very readable hymn of praise to an invention so vast and so effective that it is generally taken for granted. More than half the global population already live in urban areas and, every month, five million more flood into the cities of the developed and developing worlds. The crowds and poverty of some of these modern cities may horrify us. They shouldn't, says Glaeser — they are signs of growth, energy and aspiration. Cities are our best and brightest hope.</p>
<p><span class="pl">B</span>This idea has had more than two hundred years of resistance. Not long after the Industrial Revolution began in Britain, the Romantic poets turned away from the smoke and factories of their cities to celebrate the air and light of untouched nature. In 19th-century America, the writer Henry David Thoreau retreated to the wilderness of Walden Pond to live the solitary, simple life, and convinced generations of Americans that cities were bad and nature was good.</p>
<p><span class="pl">C</span>They had, Glaeser admits, a point. The early industrial cities were dirty, since they lacked efficient waste disposal systems, and disease spread rapidly among the population. But more importantly they were profitable, and there were enormous commercial incentives to make them work, as well as political ones. Their transformation could be achieved at a stroke: in the second half of the 19th century, the French Emperor Napoleon III gave Baron Haussmann unrestricted power to turn the slum-infested city of Paris into one of the wonders and delights of the modern world. Or the transformation could be done by trial and error. Glaeser gives a brilliant account of the stop-start progression of New York to its late 20th-century position as the cultural and economic centre of the world. Either way, Paris, New York and other cities developed because they were truly effective markets of ideas and innovation.</p>
<p><span class="pl">D</span>For these and many other reasons, we should not be so upset by the spectacle of urban poverty. The poor flock to cities in the hope of becoming richer (which, by and large, they do). They also reinvigorate the economy of the city. It is folly to drive them away by forcing property prices to soar with unreasonable planning regulations. Instead, cities should build more houses and thereby hold property prices in check.</p>
<p><span class="pl">E</span>It can go wrong, of course. In Glaeser's view, this is primarily because municipal authorities fail to understand the principal virtues of their cities. The heart of Paris, as many Parisians say, is turning into a museum because of the desire to preserve Baron Haussmann's 19th-century boulevards. Glaeser defends their preservation, but argues that in the 1950s the French made a mistake in establishing a huge high-rise commercial development — <em>La Défense</em> — on the outskirts of the city. Far better, he says, to have turned the central area of Montparnasse into a new commercial district. This would have revitalised much of the city centre without destroying its fabric. In India, Mumbai could save itself from ever-more inefficient sprawl over the surrounding area simply by relaxing the rules presently imposed on the height of new constructions.</p>
<p><span class="pl">F</span>In America, it is the suburbs that have proved to be the real disaster. Glaeser is repentant on this subject himself. He moved to the suburbs when he had children. His entirely legitimate excuse is that the government made him (and millions like him) do it. By under-taxing petrol and imposing tight planning restrictions on inner cities that drove up the cost of property, it made flight to the suburbs more or less inevitable for the middle classes.</p>
<p><span class="pl">G</span>This is a disaster because nothing is more inefficient than a suburb. Suburbanites mingle less, and lose the face-to-face contact that makes being an urbanite so much more creative. Moreover, houses are costlier to heat and cool than flats, and suburbanites drive thousands more miles per year than city dwellers. Every aspect of life involves more consumption. This leads to the strongest and newest argument in favour of cities — they are good for the environment. To live in the country or the suburbs is to have a vastly larger carbon footprint than any urbanite.</p>
<p><span class="pl">H</span>Full of characters and accessible information, this is a tremendous book, not least because, like me, you will find yourself constantly seeking reasons to disagree. Like the poor in the city, this is a sign of success. If you hate the city and get moist-eyed at the thought of the country then, one way or another, Glaeser is the man you will have to take on.</p>`

  2: {
    title: `The Tasmanian Tiger`,
    sub: null,
    html: `
<p><span class="pl">A</span>The Tasmanian tiger, or thylocine, was a carnivorous marsupial (a meat-eating mammal which carries its young in a pouch). It was given the name 'tiger' because it had striped fur, and because it was ferocious. Between 24 million and 15 million years ago, many types of thylocine roamed across Australia, their powerful jaws playing a role in maintaining a balance in the ecosystems of their day. Some species were fox-sized, while others were barely the size of kittens.</p>
<p><span class="pl">B</span>But when a period of climate change cooled Australia about 12 million years ago, the numbers of these ancient thylocines began to decline. By about 3 million years ago, only one species was left. About 4,000 years ago, these vanished completely from the Australian mainland, so that Tasmania, a large island to the south of Australia, was then the last remaining place where thylocines existed. They ruled the animal life of that island unchallenged until Europeans with sheep, dogs and a great indifference to native flora and fauna, seem to have brought about their extinction. In 1936, the last captive Tasmanian tiger died in Hobart Zoo. Since then, many expeditions have searched for tigers in the Tasmanian bush, but no definitive evidence has been found. Despite this, there are many who keep searching.</p>
<p><span class="pl">C</span>In 1981, Dutch-born zoologist Hans Naarding was in Tasmania conducting a survey of Latham's snipe, a species of endangered bird. One night he saw an animal in the light from the searchlight mounted on his vehicle. He described it as about the size of a large dog, but with slightly sloping hindquarters and a fairly thick tail continuing straight on from its backbone. He said that it had 12 distinct stripes on its back, running down to the point where the tail began. He reported the sighting to the Director of Tasmania's National Parks. When the news broke, said Naarding, he was besieged by television crews, including four or five from Japan, and others from the United Kingdom, Germany, New Zealand and South America.</p>
<p><span class="pl">D</span>Government and private search parties combed the region, but no further sightings were made. The tiger, as always, had escaped to its lair — a place that many insist exists only in the imagination. Others disagree: there have been more than 4,000 claimed sightings of the animal since it supposedly died out, and the average number of claims reported to the authorities each year is now 150. So is it out there? Even experts differ in opinion.</p>
<p><span class="pl">E</span>Randolph Rose, Associate Professor of Zoology at the University of Tasmania, says that he dreamed of seeing a thylocine, but is now convinced that his dream will go unfulfilled. The consensus among conservationists is that any animal with a population base of less than 1,000 is headed for extinction within 60 years. 'Sixty years ago,' he says, 'there was only one thylocine that we know of, and that was in Hobart Zoo. Take it from me, the tiger is gone.'</p>
<p><span class="pl">F</span>But Dr David Pemberton, curator of zoology at the Tasmanian Museum, states that, despite scientific thinking that a relatively large number of animals is required to sustain a population, 'the Florida panther is down to a dozen or so animals, and, while it does have some inbreeding problems, is still ticking along!' After all, animals can be notoriously elusive. The strange fish known as the coelacanth, with its 'proto legs', was thought to have died out with dinosaurs 700 million years ago until a specimen was dragged to the surface in a shark net off the coast of South Africa in 1938.</p>
<p><span class="pl">G</span>Wildlife biologist Nick Mooney has the unenviable task of investigating all so-called sightings of the tiger. It was Mooney who was first consulted in late February 2005 about the authenticity of new digital photographic images of a thylocine allegedly taken by a tourist. On face value, Mooney says, this particular account of a sighting and the photographs submitted as proof amount to one of the most convincing cases for the species' survival that he has seen. Many other 'sightings' have been hoaxes, and many sincere seekers are victims of obsession. 'It is a blind optimism that something is, rather than cynicism that something isn't,' Mooney says. 'If something crosses the road, it's not a case of "I wonder what that was?" Rather, it is a case of "That's a thylocine!"'</p>
<p><span class="pl">H</span>However, Mooney treats all sightings on face value. 'I never try to embarrass people,' he says, '...but the fact that I don't pack the car immediately after they telephone can often be taken as ridicule. Obsessive characters get angry that someone in my position is not out there when they think the thylocine is there.'</p>
<p><span class="pl">I</span>Hans Naarding, whose sighting of a striped animal two decades ago was the highlight of a lifetime of animal spotting, remains puzzled by the time and money people waste on tiger searches. He says resources would be better applied to saving another endangered animal, the Tasmanian devil, and helping declining migratory bird populations. Could the thylocine still be out there? 'Sure,' Naarding says. 'I know the vast south-west wilderness of Tasmania well. They could survive … [But] if this is the case, it will not be long before they do disappear completely.' Naarding believes that any discovery of surviving thylocines would be 'rather pointless'. 'How do you bring a species back from extinction?' he asks. 'What could you do with it? If there are thylocines out there, they are better off right where they are.'</p>`

    sub: `Studies show that learning a musical instrument can bring about significant improvements in your brain`,
    html: `
<p><span class="pl">A</span>Are music lessons the way to get smarter? That's what a lot of parents and experts believe: studying an instrument gives children an advantage in the development of their intellectual, perceptual, and cognitive skills. This may, however, turn out to be wishful thinking. Two highly convincing trials carried out recently have found no evidence to support this idea; the IQs of pre-school children who attended several weeks of music classes as part of these studies did not differ significantly from the IQs of those who had not.</p>
<p><span class="pl">B</span>But that does not mean that the advantages of learning to play music are limited to expressing yourself, impressing friends, or just having fun. A growing number of studies show that learning an instrument in childhood can do something perhaps more valuable for the brain: it can provide benefits as we age, in the form of an added defense against memory loss, cognitive decline, and impaired hearing. Not only that, you may well get those benefits even if you haven't picked up your instrument in years, or decide to take up music for the first time in mid-life or beyond. According to neuropsychologist Brenda Hanna-Pladdy of Emory University in Atlanta, the time spent learning and practicing specific types of motor control and coordination — each finger on each hand doing something different, and for wind and brass instruments, also using your mouth and breathing — contributes to the brain boost that shows up later in life.</p>
<p><span class="pl">C</span>You can even map the impact of musical training on the brain itself. In one study, Harvard neurologist Gottfried Schlaug found that the brains of adult professional musicians had a larger volume of grey matter than the brains of non-musicians had. Schlaug and colleagues also found that after 15 months of musical training in early childhood, structural brain changes associated with motor and auditory improvements begin to appear. 'What's unique about playing an instrument is that it requires a wide array of brain regions and cognitive functions to work together simultaneously, in both right and left hemispheres of the brain,' says Alison Balbag of the University of Southern California. 'Playing music may be an efficient way to stimulate the brain,' she says, 'cutting across a broad swath of its regions and cognitive functions and with ripple effects through the decades.'</p>
<p><span class="pl">D</span>More research is showing this might well be the case. In her first study on the subject, Hanna-Pladdy divided 70 healthy adults between the ages of 60 and 83 into three groups: musicians who had studied an instrument for at least ten years, those who had played between one and nine years, and a control group who had never learned an instrument. The group who had studied for at least ten years scored the highest when tested in such areas as nonverbal and visuo-spatial memory, naming objects, and taking in and adapting new information. Her follow-up study a year later confirmed those findings and further suggested that starting musical training before the age of nine and keeping at it for ten years or more may yield the greatest benefits. Interestingly, it was the group who had the lowest level of general education which showed the greatest gap in scores between those who had studied an instrument in childhood and those who had not. Hanna-Pladdy suspects that musical training could have made up for the lack of cognitive stimulation these people had.</p>
<p><span class="pl">E</span>Neuroscientist Nina Kraus of Northwestern University in Chicago has found still more positive effects of early musical training. She measured the electrical activity in the auditory brainstem of adults, aged 55 to 70, as they responded to the synthesized speech syllable 'da.' Although none of the subjects had played a musical instrument in 40 years, those who had trained the longest — between four and fourteen years — responded the fastest. 'That's significant,' says Kraus, 'because hearing tends to decline as we age, including the ability to quickly and accurately discern consonants, a skill crucial to understanding and participating in conversation. If your nervous system is not keeping up with the timing necessary for encoding consonants, you will lose out on the flow and meaning of the conversation, and that can potentially create a downward spiral leading to a sense of social isolation,' says Kraus. In addition, the fact that musical training appears to enhance auditory working memory might help reinforce in later life the memory capacity that facilitates verbal interaction.</p>
<p><span class="pl">F</span>In another study at the University of South Florida, assistant professor of music education Jennifer Bugos studied the impact of elementary piano instruction on adults between the ages of 60 and 85. After six months, those who had received piano lessons showed more robust gains in memory, verbal fluency, the speed at which they processed information, planning ability, and other cognitive functions compared with those who had not received the lessons. Bugos believes that playing an instrument has beneficial effects, regardless of how old the person is when he or she begins. 'Musical training contains all the components of a cognitive training program that sometimes are overlooked,' she says. 'And just as we work out our bodies, we should work out our minds.'</p>`
  }

  if(!ua||!ca) return false;
  const u=ua.toString().trim().toLowerCase();
  const c=ca.toString().trim().toLowerCase();
  return u===c;
}

function dispAK(q) {
  const a=AK[q]; if(!a) return '—';
  const s=a.toString();
  // fill-in blanks: capitalize properly
  const fills=[1,2,3,4,5,6,7,8,14,15,16,17,18];
  if(fills.includes(q)) return s.charAt(0).toUpperCase()+s.slice(1);
  return s.toUpperCase();
}

function dispUA(q) {
  const ua=ANS[q];
  if(!ua) return '<em style="color:#aaa">No answer</em>';
  return ua;
}

function bandScore(n) {
  if(n>=39)return'9.0';if(n>=37)return'8.5';if(n>=35)return'8.0';
  if(n>=33)return'7.5';if(n>=30)return'7.0';if(n>=27)return'6.5';
  if(n>=23)return'6.0';if(n>=19)return'5.5';if(n>=15)return'5.0';
  if(n>=13)return'4.5';return'4.0';
}

function showResults() {
  let total=0;
  for(let q=1;q<=40;q++) if(chkAns(q)) total++;
  const pct=Math.round(total/40*100);
  const band=bandScore(total);

  let html=`<div class="rm-head"><h2>📋 Results — IELTS Reading 103</h2></div>`;

  const bandColor = pct>=70?'#2e7d32':pct>=50?'#e65100':'#c62828';
  html+=`<div class="total-strip">
    <div class="ts-score">${total} / 40</div>
    <div class="ts-band">Score: ${pct}% &nbsp;·&nbsp; Estimated Band Score: <strong>${band}</strong></div>
  </div>`;

  for(let p=1;p<=3;p++) {
    const [s,e]=pRanges[p];
    let pc=0;
    for(let q=s;q<=e;q++) if(chkAns(q)) pc++;
    const pt=e-s+1;
    const pp2=Math.round(pc/pt*100);
    const bc=pp2>=70?'sb-g':pp2>=50?'sb-o':'sb-r';
    html+=`<div class="pr-section">
      <div class="pr-hdr">
        <h3>Passage ${p}: ${pTitles[p]} <small style="color:#888;font-size:12px">&nbsp;(Q${s}–Q${e})</small></h3>
        <span class="s-badge ${bc}">${pc}/${pt} (${pp2}%)</span>
      </div>
      <table class="rt"><thead><tr><th>Q#</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th></tr></thead><tbody>`;
    for(let q=s;q<=e;q++) {
      const ok=chkAns(q);
      html+=`<tr class="${ok?'cr':'wr'}"><td><strong>${q}</strong></td><td>${dispUA(q)}</td><td>${dispAK(q)}</td><td>${ok?'<span class="ck">✓</span>':'<span class="cx">✗</span>'}</td></tr>`;
    }
    html+=`</tbody></table></div>`;
  }

  html+=`<button id="close-res" onclick="closeRes()">✕ Close Results</button>`;
  document.getElementById('res-modal').innerHTML=html;
  document.getElementById('res-overlay').classList.add('open');
}

function closeRes() { document.getElementById('res-overlay').classList.remove('open'); }
