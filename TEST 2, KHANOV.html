<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IELTS Reading — Test 2</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:Arial,Helvetica,sans-serif;
    color:#1a1a1a;background:#fff;
    display:flex;flex-direction:column;height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}

  .back-btn{
    display:inline-flex;align-items:center;gap:5px;
    color:#555;font-size:13px;font-weight:500;
    text-decoration:none;padding:4px 8px;border-radius:5px;
    transition:background .15s,color .15s;
  }
  .back-btn:hover{background:#f0f0f0;color:#1a1a1a}
  .back-btn svg{flex-shrink:0}

  /* ===== HEADER ===== */
  .header{
    height:52px;flex:0 0 52px;
    border-bottom:1px solid #ddd;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;background:#fff;
    position:relative;z-index:10;
  }
  .h-left{display:flex;align-items:center;gap:12px}
  .ielts-badge{
    background:#c41230;color:#fff;font-weight:700;
    padding:6px 12px;border-radius:4px;
    font-size:14px;letter-spacing:1px;
  }
  .tg-pill{
    display:inline-flex;align-items:center;gap:8px;
    background:#f4f4f4;border-radius:999px;
    padding:3px 14px 3px 3px;
    font-size:13px;font-weight:500;color:#1a1a1a;
    transition:background .15s;
  }
  .tg-pill:hover{background:#ececec}
  .tg-icon{
    width:28px;height:28px;border-radius:50%;
    background:linear-gradient(135deg,#37AEE2 0%,#1E96C8 100%);
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 -1px 0 rgba(0,0,0,.08);
  }
  .h-right{position:relative}
  .hamburger{
    width:36px;height:36px;border:none;background:transparent;
    cursor:pointer;border-radius:6px;
    display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;
  }
  .hamburger:hover{background:#f0f0f0}
  .hamburger span{display:block;width:18px;height:2px;background:#333;border-radius:1px}
  .menu-panel{
    position:absolute;top:46px;right:0;
    background:#fff;border:1px solid #ddd;border-radius:8px;
    box-shadow:0 6px 18px rgba(0,0,0,.1);
    padding:14px;min-width:240px;display:none;z-index:200;
  }
  .menu-panel.open{display:block}
  .menu-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:6px 0}
  .menu-row + .menu-row{border-top:1px solid #f0f0f0;margin-top:2px}
  .menu-ctrls{display:flex;align-items:center;gap:6px}
  .size-btn{
    width:28px;height:28px;border:1px solid #ccc;background:#fff;border-radius:4px;
    cursor:pointer;font-weight:700;font-size:12px;font-family:inherit;
  }
  .size-btn:hover{background:#f5f5f5}
  .size-val{min-width:42px;text-align:center;font-size:12px;color:#666}

  /* ===== PROGRESS ===== */
  .progress{height:3px;background:#eee;flex:0 0 3px}
  .progress-fill{height:100%;background:#c41230;width:0;transition:width .25s}

  /* ===== MAIN ===== */
  .main{flex:1 1 auto;display:flex;overflow:hidden;min-height:0}
  .pane{overflow-y:auto;padding:24px 28px 40px;min-width:200px}
  .pane-left{background:#fafafa;width:50%;flex:0 0 50%}
  .pane-right{background:#fff;flex:1 1 auto}
  .pane::-webkit-scrollbar{width:10px}
  .pane::-webkit-scrollbar-thumb{background:#ccc;border-radius:5px}
  .pane::-webkit-scrollbar-thumb:hover{background:#aaa}
  .divider{
    width:6px;background:#e0e0e0;cursor:col-resize;
    flex:0 0 6px;position:relative;transition:background .15s;
  }
  .divider:hover,.divider.dragging{background:#c41230}
  .divider::after{
    content:'';position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:2px;height:34px;background:#999;border-radius:1px;
  }
  .divider:hover::after,.divider.dragging::after{background:#fff}

  /* ===== PASSAGE ===== */
  #passagePane{font-size:14px;line-height:1.65}
  .pass-title{
    font-size:1.55em;font-weight:700;color:#1a1a1a;
    margin-bottom:6px;
  }
  .pass-sub{
    font-size:0.95em;color:#666;font-style:italic;
    margin-bottom:14px;padding-bottom:10px;
    border-bottom:2px solid #c41230;
  }
  .pass-body p{margin-bottom:14px;text-align:justify;hyphens:auto}
  .para-letter{
    font-weight:700;display:inline-block;margin-right:8px;color:#c41230;
  }
  .highlight{
    background:#fff59d;cursor:pointer;
    padding:1px 2px;border-radius:2px;
    transition:background .15s;
  }
  .highlight:hover{background:#ffeb3b}
  .hl-pill{
    position:fixed;background:#1a1a1a;color:#fff;
    padding:7px 14px;border-radius:999px;
    font-size:12px;font-weight:600;
    cursor:pointer;z-index:1500;
    box-shadow:0 4px 12px rgba(0,0,0,.25);
    display:none;user-select:none;
  }
  .hl-pill:hover{background:#000}

  /* ===== QUESTIONS ===== */
  #questionPane{font-size:13px;line-height:1.55}
  .q-instr{
    background:#f5f5f5;border-left:3px solid #c41230;
    padding:10px 14px;margin-bottom:18px;
    font-size:0.95em;line-height:1.55;
    border-radius:0 4px 4px 0;
  }
  .q-instr strong{color:#c41230}
  .q-item{margin-bottom:16px;padding:6px 0;scroll-margin-top:30px}
  .q-num{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:26px;height:22px;
    background:#1a1a1a;color:#fff;
    padding:0 6px;border-radius:3px;
    font-weight:700;font-size:11px;
    margin-right:8px;flex-shrink:0;
  }
  .q-text{margin-bottom:8px;line-height:1.55;display:flex;align-items:flex-start}
  .q-text-body{flex:1}
  .q-options{display:flex;flex-direction:column;gap:6px;margin-left:34px}
  .q-options.radio-row{flex-direction:row;gap:0;flex-wrap:wrap}
  .q-options.mcq-vert{flex-direction:column;gap:6px}
  .opt-label{
    display:inline-flex;align-items:center;gap:6px;
    cursor:pointer;padding:5px 10px;
    border:1px solid #ccc;background:#fff;
    font-size:0.92em;transition:all .12s;
    user-select:none;border-radius:4px;
  }
  .opt-label:hover{background:#f5f5f5}
  .opt-label input{cursor:pointer;margin:0}
  .opt-label.selected{background:#c41230;color:#fff;border-color:#c41230}
  .opt-label.selected input{accent-color:#fff}
  .radio-row .opt-label{border-radius:0;border-right:none}
  .radio-row .opt-label:first-of-type{border-radius:4px 0 0 4px}
  .radio-row .opt-label:last-of-type{border-radius:0 4px 4px 0;border-right:1px solid #ccc}
  .radio-row .opt-label.selected + .opt-label{border-left-color:#c41230}
  .mcq-vert .opt-label{
    display:flex;align-items:flex-start;
    padding:8px 12px;text-align:left;
    line-height:1.4;
  }
  .mcq-vert .opt-label input{margin-top:2px;flex-shrink:0}

  .inline-q{display:flex;align-items:flex-start;gap:0;margin-bottom:14px}
  .inline-q-body{flex:1;line-height:1.7}

  .q-input{
    border:none;border-bottom:2px solid #888;
    background:transparent;
    font-family:inherit;font-size:inherit;color:inherit;
    padding:2px 4px;min-width:120px;
    outline:none;transition:border-color .15s,background .15s;
    scroll-margin-top:30px;
  }
  .q-input:focus{border-bottom-color:#c41230;background:#fffbe5}
  .q-input.has-value{background:#fff3cd;border-bottom-color:#f9a825}

  /* Blank wrapper with Q# prefix */
  .q-blank{display:inline-block;white-space:nowrap;margin:0 2px}
  .q-blank-num{
    display:inline-block;vertical-align:middle;
    min-width:20px;height:18px;
    background:#1a1a1a;color:#fff;
    border-radius:3px;
    font-weight:700;font-size:10px;
    padding:0 5px;line-height:18px;
    margin-right:4px;text-align:center;
  }
  .q-blank input{vertical-align:middle;min-width:110px;max-width:180px}

  /* Notes box */
  .notes-box{
    border:2px solid #c0c0c0;border-radius:8px;
    padding:16px 22px 18px;
    background:#fcfcfa;margin-bottom:20px;
  }
  .notes-title{
    font-weight:700;text-align:center;font-size:1.15em;
    margin-bottom:14px;padding-bottom:10px;
    border-bottom:1px solid #ddd;color:#1a1a1a;
  }
  .notes-section{margin-bottom:14px}
  .notes-section:last-child{margin-bottom:0}
  .notes-heading{
    font-weight:600;margin-bottom:8px;
    font-size:1.02em;color:#1a1a1a;
  }
  .notes-section ul{list-style:none;margin-left:8px;padding:0}
  .notes-section li{
    margin-bottom:6px;padding-left:18px;
    position:relative;line-height:2;
  }
  .notes-section li::before{
    content:'–';position:absolute;left:0;
    color:#999;font-weight:700;
  }

  /* Summary block (no border, prose-style) */
  .summary-block{margin-bottom:20px}
  .summary-title{
    font-weight:700;font-size:1.1em;
    margin-bottom:12px;text-align:center;
  }
  .summary-block p{
    line-height:2.1;margin-bottom:10px;
    text-align:justify;
  }

  /* Matching list */
  .matching-list{
    border:2px solid #c0c0c0;border-radius:8px;
    padding:14px 20px;background:#fcfcfa;
    margin-bottom:18px;
  }
  .matching-list-title{
    font-weight:700;text-align:center;
    margin-bottom:10px;padding-bottom:8px;
    border-bottom:1px solid #ddd;font-size:1.05em;
  }
  .matching-list ol{list-style:none;padding:0;margin:0}
  .matching-list li{
    padding:5px 0;display:flex;gap:10px;line-height:1.5;
  }
  .matching-list .letter{
    font-weight:700;flex-shrink:0;min-width:22px;color:#c41230;
  }
  .matching-list .desc{flex:1}

  /* MCQ pair options box (shows A-E choices for Q20-21) */
  .mcq-pair-box{
    border:2px solid #c0c0c0;border-radius:8px;
    padding:14px 20px;background:#fcfcfa;
    margin-bottom:14px;
  }
  .mcq-pair-stem{font-weight:600;margin-bottom:10px;line-height:1.55}
  .mcq-pair-box ol{list-style:none;padding:0;margin:0}
  .mcq-pair-box li{
    padding:4px 0;display:flex;gap:10px;line-height:1.5;
  }
  .mcq-pair-box .letter{
    font-weight:700;flex-shrink:0;min-width:18px;color:#c41230;
  }

  /* Select dropdown */
  .q-select{
    font-family:inherit;font-size:0.92em;
    padding:5px 8px;border:1px solid #888;border-radius:4px;
    background:#fff;cursor:pointer;color:inherit;
    outline:none;transition:border-color .15s,background .15s;
  }
  .q-select:focus{border-color:#c41230}
  .q-select.has-value{background:#fff3cd;border-color:#f9a825}
  .q-select.narrow{min-width:80px;max-width:110px}
  .q-select.wide{min-width:200px;max-width:280px}
  .select-q-row{
    display:flex;align-items:center;gap:10px;
    margin-bottom:14px;padding:6px 0;
    flex-wrap:wrap;scroll-margin-top:30px;
  }
  .select-q-row .q-num{flex-shrink:0}
  .select-q-text{flex:1;min-width:0;line-height:1.5}

  /* ===== BOTTOM NAV ===== */
  .bottom-nav{
    height:44px;flex:0 0 44px;
    background:#f0f0f0;border-top:1px solid #ddd;
    display:flex;align-items:center;
    padding:0 12px;gap:8px;
    overflow-x:auto;overflow-y:hidden;
  }
  .bottom-nav::-webkit-scrollbar{height:4px}
  .bottom-nav::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
  .nav-pass{
    font-weight:700;font-size:13px;
    cursor:pointer;padding:5px 10px;border-radius:4px;
    white-space:nowrap;transition:background .15s;flex-shrink:0;
  }
  .nav-pass:hover{background:#e0e0e0}
  .nav-pass.active{color:#c41230}
  .nav-pass small{font-weight:500;color:#666;font-size:0.85em}
  .q-pill{
    width:26px;height:26px;
    border:1px solid #bbb;background:#fff;
    border-radius:4px;font-size:11px;
    cursor:pointer;flex-shrink:0;
    display:inline-flex;align-items:center;justify-content:center;
    font-family:inherit;color:#333;transition:all .12s;
  }
  .q-pill:hover{background:#ebebeb;border-color:#999}
  .q-pill.answered{
    font-weight:700;background:#ffd54f;border-color:#f9a825;color:#5d4037;
  }
  .nav-sep{width:1px;height:26px;background:#ccc;flex-shrink:0;margin:0 4px}
  .nav-spacer{flex:1}
  .submit-btn{
    height:30px;padding:0 16px;
    background:#28a745;color:#fff;border:none;border-radius:4px;
    cursor:pointer;font-weight:600;font-size:13px;font-family:inherit;
    display:inline-flex;align-items:center;gap:6px;
    flex-shrink:0;transition:background .15s;
  }
  .submit-btn:hover{background:#218838}

  /* ===== MODAL ===== */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.6);
    display:none;align-items:center;justify-content:center;
    padding:20px;z-index:3000;
  }
  .modal-overlay.open{display:flex}
  .modal{
    background:#fff;border-radius:10px;
    max-width:820px;width:100%;max-height:90vh;
    overflow-y:auto;padding:28px;position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
  }
  .modal-close{
    position:absolute;top:14px;right:14px;
    background:transparent;border:none;
    font-size:28px;line-height:1;
    cursor:pointer;color:#888;width:34px;height:34px;
    border-radius:50%;transition:background .15s;
  }
  .modal-close:hover{background:#f0f0f0;color:#000}
  .modal h2{margin-bottom:20px;font-size:24px;color:#1a1a1a}
  .result-pass{
    margin-bottom:20px;border:1px solid #e0e0e0;
    border-radius:8px;overflow:hidden;
  }
  .result-pass-header{
    background:#fafafa;padding:14px 18px;
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    border-bottom:1px solid #e0e0e0;
  }
  .result-pass-info{flex:1;min-width:0}
  .result-pass-title{font-weight:700;font-size:14px;color:#1a1a1a}
  .result-pass-sub{font-size:12px;color:#666;margin-top:3px}
  .score-badge{
    padding:5px 14px;border-radius:999px;
    color:#fff;font-weight:700;font-size:13px;flex-shrink:0;
  }
  .badge-green{background:#28a745}
  .badge-orange{background:#fd7e14}
  .badge-red{background:#dc3545}
  .result-table{width:100%;border-collapse:collapse;font-size:13px}
  .result-table th,.result-table td{
    padding:8px 14px;text-align:left;border-bottom:1px solid #f0f0f0;
  }
  .result-table th{
    background:#f9f9f9;font-weight:600;font-size:12px;
    color:#555;text-transform:uppercase;letter-spacing:.4px;
  }
  .result-table td{vertical-align:middle}
  .row-correct{background:#e8f5e9}
  .row-wrong{background:#ffebee}
  .mark{font-weight:700;font-size:15px}
  .mark-ok{color:#28a745}
  .mark-x{color:#dc3545}
  .total-strip{
    margin-top:24px;padding:22px 24px;
    background:linear-gradient(135deg,#c41230 0%,#8b0d23 100%);
    color:#fff;border-radius:10px;
    display:flex;justify-content:space-around;align-items:center;
    text-align:center;flex-wrap:wrap;gap:16px;
  }
  .total-block{flex:1;min-width:140px}
  .total-label{font-size:12px;text-transform:uppercase;letter-spacing:1px;opacity:.85}
  .total-value{font-size:32px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
  .total-band-value{font-size:36px}

  body.dragging{user-select:none;cursor:col-resize}
  body.dragging *{cursor:col-resize!important}
</style>
</head>

<script>
/* ============================================================
   HELPERS
============================================================ */
function escapeAttr(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function blank(n){
  return `<span class="q-blank"><span class="q-blank-num">${n}</span><input class="q-input" data-q="${n}" autocomplete="off" spellcheck="false"></span>`;
}
function displayAnswer(v){
  if (v === undefined || v === null || v === '') return '—';
  if (v === 'T') return 'TRUE';
  if (v === 'F') return 'FALSE';
  if (v === 'Y') return 'YES';
  if (v === 'N') return 'NO';
  if (v === 'NGV') return 'NOT GIVEN';
  return v;
}
function normalize(s){
  return String(s).trim().toLowerCase().replace(/\s+/g, ' ');
}
function checkAnswer(user, correct){
  if (!user || user === '—') return false;
  const userN = normalize(user);
  const correctList = Array.isArray(correct) ? correct : [correct];
  return correctList.some(c => normalize(c) === userN);
}
function displayCorrect(c){
  const v = Array.isArray(c) ? c[0] : c;
  return displayAnswer(v);
}

/* ============================================================
   PASSAGES
============================================================ */
const PASSAGES = {
  1: `
    <h1 class="pass-title">The Importance of Business Cards</h1>
    <div class="pass-sub">The exchanging of business cards is as close to a universal ritual as you can find in the business world</div>
    <div class="pass-body">
      <p><span class="para-letter">A</span>The ritual may be universal, but the details of business cards and how they are swapped vary across countries. Americans throw their cards casually across a table; the Japanese make the exchange of cards a formal ceremony. While there are cards that are discreet and understated, others are crammed full of details and titles. Some businesspeople hand out 24-carat gold cards, and there are kindergarten children who have cards with not only their own contact details, but also with the job descriptions of their parents and even grandparents. This practice has become so common in parts of New York, for example, that the use of such cards is now prohibited by some of these institutions.</p>
      <p><span class="para-letter">B</span>Cards have been around a long time in one form or another. The Chinese invented calling cards in the 15th century to give people notice that they intended to pay them a visit, but these were for social purposes only. Then, in the 17th century, European businesspeople invented a new type of card to act as miniature advertisements, signalling the advent of the business card. In today's world, business cards can cause people to have strong emotional reactions. According to one experienced company director, very few things can provoke more heated discussion at a board meeting than the composition of the company's business cards.</p>

      html += item.content;
    }
    else if (item.type === 'tfng') {
      html += renderRadioItem(item.n, item.text, [['T','TRUE'],['F','FALSE'],['NGV','NOT GIVEN']], state.answers[item.n] || '', 'radio-row');
    }
    else if (item.type === 'ynng') {
      html += renderRadioItem(item.n, item.text, [['Y','YES'],['N','NO'],['NGV','NOT GIVEN']], state.answers[item.n] || '', 'radio-row');
    }
    else if (item.type === 'mcq') {
      html += renderRadioItem(item.n, item.text, item.options, state.answers[item.n] || '', 'mcq-vert');
    }
    else if (item.type === 'select-q') {
      const cur = state.answers[item.n] || '';
      const sc = item.selectClass || '';
      const opts = `<option value="">— select —</option>` +
        item.options.map(([v, label]) =>
          `<option value="${v}" ${cur === v ? 'selected' : ''}>${escapeAttr(label)}</option>`
        ).join('');
      html += `<div class="q-item select-q-row" id="q-${item.n}">
        <span class="q-num">${item.n}</span>
        <span class="select-q-text">${item.text}</span>
        <select class="q-select ${sc} ${cur ? 'has-value' : ''}" data-q="${item.n}">${opts}</select>
      </div>`;
    }
    else if (item.type === 'html') {
      html += item.content;
    }
  }
  questionPane.innerHTML = html;
  questionPane.style.fontSize = state.questionSize + 'px';
  hydrateInputs();
  attachQuestionListeners();
}

function hydrateInputs(){
  questionPane.querySelectorAll('input.q-input[data-q]').forEach(inp => {
    const n = parseInt(inp.dataset.q, 10);
    const cur = state.answers[n];
    if (cur && !inp.value) inp.value = cur;
    if (inp.value) inp.classList.add('has-value');
  });
  questionPane.querySelectorAll('select.q-select[data-q]').forEach(sel => {
    const n = parseInt(sel.dataset.q, 10);
    const cur = state.answers[n];
    if (cur && !sel.value) {
      sel.value = cur;
      sel.classList.add('has-value');
    }
  });
}

function attachQuestionListeners(){
  questionPane.querySelectorAll('input[type="radio"]').forEach(r => {
    r.addEventListener('change', e => {
      const name = e.target.name;
      const n = parseInt(name.substring(1), 10);
      state.answers[n] = e.target.value;
      questionPane.querySelectorAll(`input[name="${name}"]`).forEach(rr => {
        rr.closest('.opt-label').classList.toggle('selected', rr.checked);
      });
      updateNav();
      updateProgress();
    });
  });
  questionPane.querySelectorAll('input.q-input[data-q]').forEach(inp => {
    inp.addEventListener('input', e => {
      const n = parseInt(e.target.dataset.q, 10);
      const v = e.target.value.trim();
      if (v) state.answers[n] = e.target.value;
      else delete state.answers[n];
      e.target.classList.toggle('has-value', !!v);
      updateNav();
      updateProgress();
    });
  });
  questionPane.querySelectorAll('select.q-select[data-q]').forEach(sel => {
    sel.addEventListener('change', e => {
      const n = parseInt(e.target.dataset.q, 10);
      const v = e.target.value;
      if (v) state.answers[n] = v;
      else delete state.answers[n];
      e.target.classList.toggle('has-value', !!v);
      updateNav();
      updateProgress();
    });
  });
}

/* ============================================================
   BOTTOM NAV
============================================================ */
function renderNav(){
  const passes = Object.keys(pRanges).map(Number);
  let html = '';
  passes.forEach((p, i) => {
    if (i > 0) html += `<div class="nav-sep"></div>`;
    const [first, last] = pRanges[p];
    if (p === state.activePassage) {
      html += `<span class="nav-pass active" data-pass="${p}">Passage ${p}</span>`;
      for (let q = first; q <= last; q++) {
        const ans = state.answers[q];
        html += `<button class="q-pill ${ans ? 'answered' : ''}" data-q="${q}">${q}</button>`;
      }
    } else {
      const total = last - first + 1;
      let answered = 0;
      for (let q = first; q <= last; q++) if (state.answers[q]) answered++;
      html += `<span class="nav-pass" data-pass="${p}">Passage ${p} <small>(${answered} of ${total} answered)</small></span>`;
    }
  });
  html += `<div class="nav-spacer"></div>`;
  html += `<button class="submit-btn" id="submitBtn">✓ Submit</button>`;
  bottomNav.innerHTML = html;

  bottomNav.querySelectorAll('.q-pill').forEach(p => {
    p.addEventListener('click', () => {
      const q = p.dataset.q;
      const el = document.getElementById('q-' + q) || questionPane.querySelector(`[data-q="${q}"]`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        if (el.classList && el.tagName !== 'INPUT' && el.tagName !== 'SELECT') {
          el.style.transition = 'background .3s';
          el.style.background = '#fffbe5';
          setTimeout(() => el.style.background = '', 700);
        } else if (el.tagName === 'INPUT' || el.tagName === 'SELECT') {
          setTimeout(() => el.focus(), 320);
        }
      }
    });
  });
  bottomNav.querySelectorAll('.nav-pass').forEach(l => {
    l.addEventListener('click', () => {
      const p = parseInt(l.dataset.pass, 10);
      if (p !== state.activePassage) {
        state.activePassage = p;
        renderPassage();
        renderQuestions();
        renderNav();
        passagePane.scrollTop = 0;
        questionPane.scrollTop = 0;
      }
    });
  });
  document.getElementById('submitBtn').addEventListener('click', showResults);
}

function updateNav(){ renderNav(); }
function updateProgress(){
  const answered = Object.keys(state.answers).length;
  progressFill.style.width = (answered / TOTAL_Q * 100) + '%';
}

/* ============================================================
   PAIR-CHECK for Q20 + Q21 (multi-choice TWO letters)
============================================================ */
function checkPair(q, userAns){
  if (!userAns) return false;
  const grp = PAIR_GROUPS[q];
  if (!grp) return false;
  const partnerAns = state.answers[grp.partner];
  const valid = grp.valid;
  // Both correct case (any order)
  if (valid.includes(userAns) && valid.includes(partnerAns) && userAns !== partnerAns) {
    return true;
  }
  // Single valid pick: only credit if not a duplicate, OR if duplicate, credit only the first Q
  if (valid.includes(userAns)) {
    if (partnerAns === userAns) {
      return q === grp.firstQ;
    }
    return true;
  }
  return false;
}

/* ============================================================
   HIGHLIGHT
============================================================ */
passagePane.addEventListener('mouseup', () => {
  setTimeout(() => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) { hlPill.style.display = 'none'; return; }
    const range = sel.getRangeAt(0);
    if (!passagePane.contains(range.commonAncestorContainer)) { hlPill.style.display = 'none'; return; }
    if (range.toString().trim() === '') { hlPill.style.display = 'none'; return; }
    const rect = range.getBoundingClientRect();
    hlPill.style.display = 'block';
    const pillW = hlPill.offsetWidth;
    const pillH = hlPill.offsetHeight;
    let left = rect.left + rect.width / 2 - pillW / 2;
    let top = rect.top - pillH - 8;
    if (top < 8) top = rect.bottom + 8;
    if (left < 8) left = 8;
    if (left + pillW > window.innerWidth - 8) left = window.innerWidth - pillW - 8;
    hlPill.style.left = left + 'px';
    hlPill.style.top = top + 'px';
  }, 0);
});

hlPill.addEventListener('mousedown', e => {
  e.preventDefault();
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  if (!passagePane.contains(range.commonAncestorContainer)) return;
  try {
    const span = document.createElement('span');
    span.className = 'highlight';
    span.appendChild(range.extractContents());
    range.insertNode(span);
    sel.removeAllRanges();
  } catch (err) { /* selection spans boundaries */ }
  hlPill.style.display = 'none';
});

passagePane.addEventListener('click', e => {
  if (e.target.classList && e.target.classList.contains('highlight')) {
    const span = e.target;
    const parent = span.parentNode;
    while (span.firstChild) parent.insertBefore(span.firstChild, span);
    parent.removeChild(span);
    parent.normalize();
  }
});

document.addEventListener('mousedown', e => {
  if (e.target !== hlPill && !passagePane.contains(e.target)) {
    hlPill.style.display = 'none';
  }
});

/* ============================================================
   DIVIDER DRAG
============================================================ */
const divider = document.getElementById('divider');
const mainEl = document.querySelector('.main');
let dragging = false;
divider.addEventListener('mousedown', e => {
  dragging = true;
  divider.classList.add('dragging');
  document.body.classList.add('dragging');
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = mainEl.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const pct = (x / rect.width) * 100;
  if (pct >= 20 && pct <= 80) {
    passagePane.style.flex = `0 0 ${pct}%`;
    passagePane.style.width = `${pct}%`;
  }
});
document.addEventListener('mouseup', () => {
  if (dragging) {
    dragging = false;
    divider.classList.remove('dragging');
    document.body.classList.remove('dragging');
  }
});

/* ============================================================
   MENU + FONT CONTROLS
============================================================ */
const hamburger = document.getElementById('hamburger');
const menuPanel = document.getElementById('menuPanel');
hamburger.addEventListener('click', e => {
  e.stopPropagation();
  menuPanel.classList.toggle('open');
});
document.addEventListener('click', e => {
  if (!menuPanel.contains(e.target) && e.target !== hamburger && !hamburger.contains(e.target)) {
    menuPanel.classList.remove('open');
  }
});
document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.target;
    const dir = parseInt(btn.dataset.dir, 10);
    if (target === 'passage') {
      state.passageSize = Math.min(22, Math.max(10, state.passageSize + dir));
      passagePane.style.fontSize = state.passageSize + 'px';
      document.getElementById('passSizeVal').textContent = state.passageSize + 'px';
    } else {
      state.questionSize = Math.min(22, Math.max(10, state.questionSize + dir));
      questionPane.style.fontSize = state.questionSize + 'px';
      document.getElementById('qSizeVal').textContent = state.questionSize + 'px';
    }
  });
});

/* ============================================================
   RESULTS / BAND
============================================================ */
function bandFromCorrect(correct){
  if (correct >= 39) return 9.0;
  if (correct >= 37) return 8.5;
  if (correct >= 35) return 8.0;
  if (correct >= 33) return 7.5;
  if (correct >= 30) return 7.0;
  if (correct >= 27) return 6.5;
  if (correct >= 23) return 6.0;
  if (correct >= 19) return 5.5;
  if (correct >= 15) return 5.0;
  if (correct >= 13) return 4.5;
  return 4.0;
}

function showResults(){
  const passes = Object.keys(pRanges).map(Number);
  let totalCorrect = 0;
  let html = '';
  passes.forEach(p => {
    const [first, last] = pRanges[p];
    let correct = 0;
    let rows = '';
    for (let q = first; q <= last; q++) {
      const u = state.answers[q];
      const c = AK[q];
      let ok;
      if (PAIR_GROUPS[q]) {
        ok = checkPair(q, u);
      } else {
        ok = checkAnswer(u, c);
      }
      if (ok) correct++;
      rows += `<tr class="${ok?'row-correct':'row-wrong'}">
        <td><strong>${q}</strong></td>
        <td>${u !== undefined && u !== '' ? displayAnswer(u) : '<em style="color:#999">—</em>'}</td>
        <td>${displayCorrect(c)}</td>
        <td class="mark ${ok?'mark-ok':'mark-x'}">${ok?'✓':'✗'}</td>
      </tr>`;
    }
    totalCorrect += correct;
    const total = last - first + 1;
    const pct = (correct / total) * 100;
    const badge = pct >= 70 ? 'badge-green' : pct >= 50 ? 'badge-orange' : 'badge-red';
    html += `<div class="result-pass">
      <div class="result-pass-header">
        <div class="result-pass-info">
          <div class="result-pass-title">Passage ${p}: ${PASSAGE_TITLES[p]}</div>
          <div class="result-pass-sub">Questions ${first}–${last}</div>
        </div>
        <div class="score-badge ${badge}">${correct} / ${total}</div>
      </div>
      <table class="result-table">
        <thead><tr><th>Q#</th><th>Your Answer</th><th>Correct Answer</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });
  const totalPct = (totalCorrect / TOTAL_Q) * 100;
  const band = bandFromCorrect(totalCorrect);
  html += `<div class="total-strip">
    <div class="total-block">
      <div class="total-label">Score</div>
      <div class="total-value">${totalCorrect} / ${TOTAL_Q}</div>
    </div>
    <div class="total-block">
      <div class="total-label">Accuracy</div>
      <div class="total-value">${totalPct.toFixed(0)}%</div>
    </div>
    <div class="total-block">
      <div class="total-label">Estimated Band</div>
      <div class="total-value total-band-value">${band.toFixed(1)}</div>
    </div>
  </div>`;
  document.getElementById('resultsBody').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('open');
});
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal').classList.remove('open');
});

/* ============================================================
   INIT
============================================================ */
renderPassage();
renderQuestions();
renderNav();
updateProgress();
</script>
