<head>

<title>IELTS Reading — Test 4</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:Arial,Helvetica,sans-serif;
    color:#1a1a1a;background:#fff;
    display:flex;flex-direction:column;height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}

  .back-btn{
    display:inline-flex;align-items:center;gap:5px;
    color:#555;font-size:13px;font-weight:500;
    text-decoration:none;padding:4px 8px;border-radius:5px;
    transition:background .15s,color .15s;
  }
  .back-btn:hover{background:#f0f0f0;color:#1a1a1a}
  .back-btn svg{flex-shrink:0}

  /* ===== HEADER ===== */
  .header{
    height:52px;flex:0 0 52px;border-bottom:1px solid #ddd;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;background:#fff;position:relative;z-index:10;
  }
  .h-left{display:flex;align-items:center;gap:12px}
  .ielts-badge{
    background:#c41230;color:#fff;font-weight:700;
    padding:6px 12px;border-radius:4px;font-size:14px;letter-spacing:1px;
  }
  .tg-pill{
    display:inline-flex;align-items:center;gap:8px;
    background:#f4f4f4;border-radius:999px;
    padding:3px 14px 3px 3px;font-size:13px;font-weight:500;color:#1a1a1a;
    transition:background .15s;
  }
  .tg-pill:hover{background:#ececec}
  .tg-icon{
    width:28px;height:28px;border-radius:50%;
    background:linear-gradient(135deg,#37AEE2 0%,#1E96C8 100%);
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 -1px 0 rgba(0,0,0,.08);
  }
  .h-right{position:relative}
  .hamburger{
    width:36px;height:36px;border:none;background:transparent;
    cursor:pointer;border-radius:6px;
    display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;
  }
  .hamburger:hover{background:#f0f0f0}
  .hamburger span{display:block;width:18px;height:2px;background:#333;border-radius:1px}
  .menu-panel{
    position:absolute;top:46px;right:0;
    background:#fff;border:1px solid #ddd;border-radius:8px;
    box-shadow:0 6px 18px rgba(0,0,0,.1);
    padding:14px;min-width:240px;display:none;z-index:200;
  }
  .menu-panel.open{display:block}
  .menu-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:6px 0}
  .menu-row + .menu-row{border-top:1px solid #f0f0f0;margin-top:2px}
  .menu-ctrls{display:flex;align-items:center;gap:6px}
  .size-btn{
    width:28px;height:28px;border:1px solid #ccc;background:#fff;border-radius:4px;
    cursor:pointer;font-weight:700;font-size:12px;font-family:inherit;
  }
  .size-btn:hover{background:#f5f5f5}
  .size-val{min-width:42px;text-align:center;font-size:12px;color:#666}

  /* ===== PROGRESS ===== */
  .progress{height:3px;background:#eee;flex:0 0 3px}
  .progress-fill{height:100%;background:#c41230;width:0;transition:width .25s}

  /* ===== MAIN ===== */
  .main{flex:1 1 auto;display:flex;overflow:hidden;min-height:0}
  .pane{overflow-y:auto;padding:24px 28px 40px;min-width:200px}
  .pane-left{background:#fafafa;width:50%;flex:0 0 50%}
  .pane-right{background:#fff;flex:1 1 auto}
  .pane::-webkit-scrollbar{width:10px}
  .pane::-webkit-scrollbar-thumb{background:#ccc;border-radius:5px}
  .pane::-webkit-scrollbar-thumb:hover{background:#aaa}
  .divider{
    width:6px;background:#e0e0e0;cursor:col-resize;
    flex:0 0 6px;position:relative;transition:background .15s;
  }
  .divider:hover,.divider.dragging{background:#c41230}
  .divider::after{
    content:'';position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);width:2px;height:34px;background:#999;border-radius:1px;
  }
  .divider:hover::after,.divider.dragging::after{background:#fff}

  /* ===== PASSAGE ===== */
  #passagePane{font-size:14px;line-height:1.65}
  .pass-title{font-size:1.55em;font-weight:700;color:#1a1a1a;margin-bottom:6px}
  .pass-sub{
    font-size:0.95em;color:#666;font-style:italic;
    margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #c41230;
  }
  .pass-body p{margin-bottom:14px;text-align:justify;hyphens:auto}
  .para-letter{font-weight:700;display:inline-block;margin-right:8px;color:#c41230}
  .highlight{
    background:#fff59d;cursor:pointer;padding:1px 2px;
    border-radius:2px;transition:background .15s;
  }
  .highlight:hover{background:#ffeb3b}
  .hl-pill{
    position:fixed;background:#1a1a1a;color:#fff;
    padding:7px 14px;border-radius:999px;
    font-size:12px;font-weight:600;cursor:pointer;z-index:1500;
    box-shadow:0 4px 12px rgba(0,0,0,.25);display:none;user-select:none;
  }
  .hl-pill:hover{background:#000}

  #questionPane{font-size:13px;line-height:1.55}
  .q-instr{
    background:#f5f5f5;border-left:3px solid #c41230;
    padding:10px 14px;margin-bottom:18px;
    font-size:0.95em;line-height:1.55;border-radius:0 4px 4px 0;
  }
  .q-instr strong{color:#c41230}
  .q-item{margin-bottom:16px;padding:6px 0;scroll-margin-top:30px}
  .q-num{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:26px;height:22px;
    background:#1a1a1a;color:#fff;padding:0 6px;border-radius:3px;
    font-weight:700;font-size:11px;margin-right:8px;flex-shrink:0;
  }
  .q-text{margin-bottom:8px;line-height:1.55;display:flex;align-items:flex-start}
  .q-text-body{flex:1}
  .q-options{display:flex;flex-direction:column;gap:6px;margin-left:34px}
  .q-options.radio-row{flex-direction:row;gap:0;flex-wrap:wrap}
  .q-options.mcq-vert{flex-direction:column;gap:6px}
  .opt-label{
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;
    padding:5px 10px;border:1px solid #ccc;background:#fff;
    font-size:0.92em;transition:all .12s;user-select:none;border-radius:4px;
  }
  .opt-label:hover{background:#f5f5f5}
  .opt-label input{cursor:pointer;margin:0}
  .opt-label.selected{background:#c41230;color:#fff;border-color:#c41230}
  .opt-label.selected input{accent-color:#fff}
  .radio-row .opt-label{border-radius:0;border-right:none}
  .radio-row .opt-label:first-of-type{border-radius:4px 0 0 4px}
  .radio-row .opt-label:last-of-type{border-radius:0 4px 4px 0;border-right:1px solid #ccc}
  .radio-row .opt-label.selected + .opt-label{border-left-color:#c41230}
  .mcq-vert .opt-label{
    display:flex;align-items:flex-start;padding:8px 12px;text-align:left;line-height:1.4;
  }
  .mcq-vert .opt-label input{margin-top:2px;flex-shrink:0}

  .q-input{

    font-family:inherit;font-size:inherit;color:inherit;
    padding:2px 4px;min-width:120px;outline:none;
    transition:border-color .15s,background .15s;scroll-margin-top:30px;
  }
  .q-input:focus{border-bottom-color:#c41230;background:#fffbe5}
  .q-input.has-value{background:#fff3cd;border-bottom-color:#f9a825}

  /* Matching list box */
  .matching-list{
    border:2px solid #c0c0c0;border-radius:8px;
    padding:14px 20px;background:#fcfcfa;margin-bottom:18px;
  }
  .matching-list-title{
    font-weight:700;text-align:center;margin-bottom:10px;

  .matching-list li{padding:5px 0;display:flex;gap:10px;line-height:1.5}
  .matching-list .letter{font-weight:700;flex-shrink:0;min-width:24px;color:#c41230}
  .matching-list .desc{flex:1}

  /* MCQ pair/triple options box */
  .mcq-pair-box{
    border:2px solid #c0c0c0;border-radius:8px;
    padding:14px 20px;background:#fcfcfa;margin-bottom:14px;
  }
  .mcq-pair-stem{font-weight:600;margin-bottom:10px;line-height:1.55}
  .mcq-pair-box ol{list-style:none;padding:0;margin:0}

  .mcq-pair-box .letter{font-weight:700;flex-shrink:0;min-width:18px;color:#c41230}

  .q-select.has-value{background:#fff3cd;border-color:#f9a825}

  .select-q-row{
    display:flex;align-items:flex-start;gap:10px;

  .nav-pass.active{color:#c41230}
  .nav-pass small{font-weight:500;color:#666;font-size:0.85em}
  .q-pill{

  .submit-btn{

  .modal-overlay{

    display:none;align-items:center;justify-content:center;
    padding:20px;z-index:3000;

  .modal-overlay.open{display:flex}
  .modal{

  .result-pass{

    background:#fafafa;padding:14px 18px;

    border-bottom:1px solid #e0e0e0;
  }
  .result-pass-info{flex:1;min-width:0}
  .result-pass-title{font-weight:700;font-size:14px;color:#1a1a1a}
  .result-pass-sub{font-size:12px;color:#666;margin-top:3px}
  .score-badge{

    padding:8px 14px;text-align:left;border-bottom:1px solid #f0f0f0;

  .row-correct{background:#e8f5e9}
  .row-wrong{background:#ffebee}
  .mark{font-weight:700;font-size:15px}

  .mark-x{color:#dc3545}
  .total-strip{

    background:linear-gradient(135deg,#c41230 0%,#8b0d23 100%);

    text-align:center;flex-wrap:wrap;gap:16px;

  .total-value{font-size:32px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
  .total-band-value{font-size:36px}

  body.dragging{user-select:none;cursor:col-resize}

  /* ── EXAM TIMER ── */
  .timer{

    color:#1a1a1a;background:#f5f5f5;border:1.5px solid #ddd;
    border-radius:8px;padding:5px 14px;letter-spacing:2px;
    transition:color .3s,background .3s,border-color .3s;

  }

  @keyframes pulse{from{opacity:1}to{opacity:.6}}
  @media(max-width:520px){.timer{font-size:12px;padding:3px 8px;letter-spacing:1px;border-radius:5px;}}
</style>

<script>
/* ============================================================
   HELPERS
============================================================ */
function escapeAttr(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function displayAnswer(v){
  if (v === undefined || v === null || v === '') return '—';
  if (v === 'T') return 'TRUE';
  if (v === 'F') return 'FALSE';
  if (v === 'Y') return 'YES';
  if (v === 'N') return 'NO';
  if (v === 'NGV') return 'NOT GIVEN';
  return v;
}
function normalize(s){
  return String(s).trim().toLowerCase().replace(/\s+/g, ' ');
}
function checkAnswer(user, correct){
  if (!user || user === '—') return false;
  const userN = normalize(user);
  const correctList = Array.isArray(correct) ? correct : [correct];
  return correctList.some(c => normalize(c) === userN);
}
function displayCorrect(c){
  const v = Array.isArray(c) ? c[0] : c;
  return displayAnswer(v);
}

/* ============================================================
   PASSAGES
============================================================ */
const PASSAGES = {
  1: `
    <h1 class="pass-title">The Blockbuster Phenomenon: a new museum trend</h1>
    <div class="pass-sub">Museums in Australia, like other pleasure-giving public organisations, are adapting their activities so that they more closely reflect the marketplace.</div>
    <div class="pass-body">
      <p><span class="para-letter">A</span>Since the 1980s, the term "blockbuster" has become the fashionable word for spectacular, high-profile museum exhibitions that have the ability to attract large crowds. A blockbuster is a "large-scale loan exhibition that people who normally don't go to museums will stand in line for hours to see" (Elsen 1984). Once the museum that created the exhibition has shown it to their local market, it can be offered to other organisations for a fee. This means that you can boost your own door takings and make money from boosting someone else's door takings.</p>
      <p><span class="para-letter">B</span>While partaking of the excitement of the blockbuster, visitors thus lured are likely to stay longer at the museum. Betty Churcher, when Director of the Australian National Gallery, summed up the new blockbuster creed as follows: the bonus of the blockbuster exhibitions is that people come to see the blockbuster and they stay to look at the permanent collection, so you are getting broader exposure for your collection.</p>
      <p><span class="para-letter">C</span>Museums across the UK, USA, Canada and Australia currently operate under a system of plural funding: revenue raised through contributions by federal, state and/or local governments, combined with revenue raised through admission charges and other activities. Maintaining and increasing visitor levels is thus paramount and involves not only creating or hiring blockbuster exhibitions, but providing regular exhibition changes and innovations. In addition, the visiting public have become known as customers rather than visitors, and the skills that are valued in museums to keep the new customers coming through the door have changed. Curators are now administrators and being a museum director no longer requires an Arts degree — but public relations skills are essential if the museum is going to compete with other museums to stage travelling exhibitions which draw huge crowds.</p>
      <p><span class="para-letter">D</span>The convergence of museums, the heritage industry, tourism, profit-making and pleasure-giving has resulted in the new "museology". This has given rise to much debate about whether it is appropriate to see museums primarily as tourist attractions. In literature from both UK and USA, the words that are starting to appear in some descriptions of blockbusters are "less scholarly", "non-elitist" and "popularist", while others extol the virtues of encouraging scholars to co-operate on projects, and to provide exhibitions that cater for a broad selection of community rather than an elite sector. Whatever commentators may think, managers of museums worldwide are looking for artful ways to blend culture and commerce, and blockbuster exhibitions are at the top of the list.</p>
      <p><span class="para-letter">E</span>But do blockbusters held in public institutions really create a surplus to fund other activities? If the bottom line is profit, then according to the records of many major museums blockbusters do make money. For museums in some countries, it may be the money that they require to replace parts of their collections or to fix buildings that are in need of attention. For some museums in Australia, it may be the opportunity to illustrate that they are attempting to pay their way by recovering part of their operating costs. Also, creating or hiring a blockbuster has many positive spin-offs: blockbusters mean crowds, and crowds are good for the local economy, providing increased trade for shops, hotels, restaurants, the transport industry and retailers. The arrangement that the arts provide sustained economic benefits has been well illustrated in impact studies in the USA and UK.</p>
      <p><span class="para-letter">F</span>However, blockbusters require large capital expenditure, and draw on resources across all branches of an organisation, and the costs don't end there. There is a Human Resource Management cost in addition to a measurable "real" dollar cost. Receiving a touring exhibition draws resources from across functional management structures in project management style. Everyone, from general labourers to building services, front of house, technical, promotional, educational and administrative staff, is required to perform additional tasks. Furthermore, as an increasing number of institutions try their hand at increasing visitor numbers and memberships (and therefore revenue) by staging blockbuster exhibitions, it may be less likely that blockbusters will continue to provide a surplus to subsidise other activities due to the competitive nature of the market.</p>

    { type:'select-q', n:31, text:'Conventional doctors are aware of the placebo effect and they', options: ENDINGS_AH, selectClass:'wide' },

    { type:'group-header', content:`<div class="q-instr"><strong>Questions 32–34</strong><br>Choose the correct letter, <strong>A</strong>, <strong>B</strong>, <strong>C</strong> or <strong>D</strong>.</div>` },
    { type:'mcq', n:32, text:'In the third paragraph, the writer says that the placebo effect',
      options: [
        ['A','A — works best in tablet form.'],
        ['B','B — is a new type of medical treatment.'],
        ['C','C — is trusted more by some patients than others.'],
        ['D','D — has a significant role in both alternative and conventional medicine.']
      ] },
    { type:'mcq', n:33, text:'A reference is made to anger and sadness in order to show that',
      options: [
        ['A','A — personal feelings can alter our physical condition.'],
        ['B','B — some human behaviour has no clear explanation.'],
        ['C','C — placebos, like emotions, are experienced by everyone.'],
        ['D','D — people find some physical reactions hard to control.']
      ] },
    { type:'mcq', n:34, text:"The writer refers to Benedetti's experiment in order to",
      options: [
        ['A','A — describe a new technique for measuring pain.'],
        ['B','B — argue that morphine is more effective than other painkillers.'],
        ['C','C — show evidence that placebos may work partly through natural opiates.'],
        ['D','D — criticise the use of saline solutions in pain studies.']
      ] },

    { type:'group-header', content:`<div class="q-instr"><strong>Questions 35–40</strong><br>Do the following statements agree with the claims of the writer in Reading Passage 3?<br>Write <strong>YES</strong> if the statement agrees with the claims of the writer, <strong>NO</strong> if the statement contradicts the claims of the writer, <strong>NOT GIVEN</strong> if it is impossible to say what the writer thinks about this.</div>` },
    { type:'ynng', n:35, text:'Scientists now have enough information to understand how the placebo effect becomes active in people.' },
    { type:'ynng', n:36, text:'As a result of experiments, some painkillers have been taken off the market.' },
    { type:'ynng', n:37, text:'Individual preference can have an impact on the effectiveness of different brands of headache tablet.' },
    { type:'ynng', n:38, text:'Doctors expressed a range of views on the drug chlorpromazine when it was first introduced.' },
    { type:'ynng', n:39, text:"Ernst's study had a big influence on doctors' behaviour with patients." },
    { type:'ynng', n:40, text:'Alternative practitioners work in a way that is likely to trigger the placebo effect.' }
  ]
};

/* ============================================================
   STATE
============================================================ */
const state = {
  activePassage: 1,
  answers: {},
  passageSize: 14,
  questionSize: 13
};
const passageNodes = {};
const questionNodes = {};

/* DOM refs */
const passagePane = document.getElementById('passagePane');
const questionPane = document.getElementById('questionPane');
const bottomNav = document.getElementById('bottomNav');
const progressFill = document.getElementById('progressFill');
const hlPill = document.getElementById('hlPill');

/* ============================================================
   RENDER
============================================================ */
function renderPassage(){
  if (passageNodes[state.activePassage]) {
    passagePane.innerHTML = '';
    passagePane.appendChild(passageNodes[state.activePassage]);
    delete passageNodes[state.activePassage];
  } else {
    passagePane.innerHTML = PASSAGES[state.activePassage];
  }
  passagePane.style.fontSize = state.passageSize + 'px';
}

function renderRadioItem(n, text, optionPairs, current, layoutClass){
  const opts = optionPairs.map(([v, label]) => `
    <label class="opt-label ${current === v ? 'selected' : ''}">
      <input type="radio" name="q${n}" value="${v}" ${current === v ? 'checked' : ''}> ${label}
    </label>`).join('');
  return `<div class="q-item" id="q-${n}">
    <div class="q-text"><span class="q-num">${n}</span><span class="q-text-body">${text}</span></div>
    <div class="q-options ${layoutClass}">${opts}</div>
  </div>`;
}

function renderQuestions(){
  if (questionNodes[state.activePassage]) {
    questionPane.innerHTML = '';
    questionPane.appendChild(questionNodes[state.activePassage]);
    delete questionNodes[state.activePassage];
    questionPane.style.fontSize = state.questionSize + 'px';
    return;
  }
  const items = QUESTIONS[state.activePassage];
  let html = '';
  for (const item of items) {
    if (item.type === 'group-header') {
      html += item.content;
    }
    else if (item.type === 'tfng') {
      html += renderRadioItem(item.n, item.text, [['T','TRUE'],['F','FALSE'],['NGV','NOT GIVEN']], state.answers[item.n] || '', 'radio-row');
    }
    else if (item.type === 'ynng') {
      html += renderRadioItem(item.n, item.text, [['Y','YES'],['N','NO'],['NGV','NOT GIVEN']], state.answers[item.n] || '', 'radio-row');
    }
    else if (item.type === 'mcq') {
      html += renderRadioItem(item.n, item.text, item.options, state.answers[item.n] || '', 'mcq-vert');
    }
    else if (item.type === 'select-q') {
      const cur = state.answers[item.n] || '';
      const sc = item.selectClass || '';
      const opts = `<option value="">— select —</option>` +
        item.options.map(([v, label]) =>
          `<option value="${v}" ${cur === v ? 'selected' : ''}>${escapeAttr(label)}</option>`
        ).join('');
      html += `<div class="q-item select-q-row" id="q-${item.n}">
        <span class="q-num">${item.n}</span>
        <span class="select-q-text">${item.text}</span>
        <select class="q-select ${sc} ${cur ? 'has-value' : ''}" data-q="${item.n}">${opts}</select>
      </div>`;
    }
    else if (item.type === 'html') {
      html += item.content;
    }
  }
  questionPane.innerHTML = html;
  questionPane.style.fontSize = state.questionSize + 'px';
  hydrateInputs();
  attachQuestionListeners();
}

function hydrateInputs(){
  questionPane.querySelectorAll('input.q-input[data-q]').forEach(inp => {
    const key = inp.dataset.q;
    const cur = state.answers[key];
    if (cur && !inp.value) inp.value = cur;
    if (inp.value) inp.classList.add('has-value');
  });
  questionPane.querySelectorAll('select.q-select[data-q]').forEach(sel => {
    const key = sel.dataset.q;
    const cur = state.answers[key];
    if (cur && !sel.value) { sel.value = cur; sel.classList.add('has-value'); }
  });
}

function attachQuestionListeners(){
  questionPane.querySelectorAll('input[type="radio"]').forEach(r => {
    r.addEventListener('change', e => {
      const name = e.target.name;
      const key = name.substring(1);
      state.answers[key] = e.target.value;
      questionPane.querySelectorAll(`input[name="${name}"]`).forEach(rr => {
        rr.closest('.opt-label').classList.toggle('selected', rr.checked);
      });
      updateNav();
      updateProgress();
    });
  });
  questionPane.querySelectorAll('input.q-input[data-q]').forEach(inp => {
    inp.addEventListener('input', e => {
      const key = e.target.dataset.q;
      const v = e.target.value.trim();
      if (v) state.answers[key] = e.target.value;
      else delete state.answers[key];
      e.target.classList.toggle('has-value', !!v);
      updateNav();
      updateProgress();
    });
  });
  questionPane.querySelectorAll('select.q-select[data-q]').forEach(sel => {
    sel.addEventListener('change', e => {
      const key = e.target.dataset.q;
      const v = e.target.value;
      if (v) state.answers[key] = v;
      else delete state.answers[key];
      e.target.classList.toggle('has-value', !!v);
      updateNav();
      updateProgress();
    });
  });
}

/* ============================================================
   BOTTOM NAV
============================================================ */
function renderNav(){
  const passes = Object.keys(pRanges).map(Number);
  let html = '';
  passes.forEach((p, i) => {
    if (i > 0) html += `<div class="nav-sep"></div>`;
    const [first, last] = pRanges[p];
    if (p === state.activePassage) {
      html += `<span class="nav-pass active" data-pass="${p}">Passage ${p}</span>`;
      for (let q = first; q <= last; q++) {
        const ans = state.answers[q];
        html += `<button class="q-pill ${ans ? 'answered' : ''}" data-q="${q}">${q}</button>`;
      }
    } else {
      const total = last - first + 1;
      let answered = 0;
      for (let q = first; q <= last; q++) if (state.answers[q]) answered++;
      html += `<span class="nav-pass" data-pass="${p}">Passage ${p} <small>(${answered} of ${total} answered)</small></span>`;
    }
  });
  html += `<div class="nav-spacer"></div>`;
  html += `<button class="submit-btn" id="submitBtn">✓ Submit</button>`;
  bottomNav.innerHTML = html;

  bottomNav.querySelectorAll('.q-pill').forEach(p => {
    p.addEventListener('click', () => {
      const q = p.dataset.q;
      const el = document.getElementById('q-' + q) || questionPane.querySelector(`[data-q="${q}"]`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        if (el.classList && el.tagName !== 'INPUT' && el.tagName !== 'SELECT') {
          el.style.transition = 'background .3s';
          el.style.background = '#fffbe5';
          setTimeout(() => el.style.background = '', 700);
        } else if (el.tagName === 'INPUT' || el.tagName === 'SELECT') {
          setTimeout(() => el.focus(), 320);
        }
      }
    });
  });
  bottomNav.querySelectorAll('.nav-pass').forEach(l => {
    l.addEventListener('click', () => {
      const p = parseInt(l.dataset.pass, 10);
      if (p !== state.activePassage) {
        const _pf = document.createDocumentFragment();
        while (passagePane.firstChild) _pf.appendChild(passagePane.firstChild);
        passageNodes[state.activePassage] = _pf;
        const _qf = document.createDocumentFragment();
        while (questionPane.firstChild) _qf.appendChild(questionPane.firstChild);
        questionNodes[state.activePassage] = _qf;
        state.activePassage = p;
        renderPassage(); renderQuestions(); renderNav();
        passagePane.scrollTop = 0; questionPane.scrollTop = 0;
      }
    });
  });
  document.getElementById('submitBtn').addEventListener('click', showResults);
}

function updateNav(){ renderNav(); }
function updateProgress(){
  const answered = Object.keys(state.answers).length;
  progressFill.style.width = (answered / TOTAL_Q * 100) + '%';
}

/* ============================================================
   HIGHLIGHT
============================================================ */
function _showPill(){setTimeout(()=>{const sel=window.getSelection();if(!sel||sel.isCollapsed){hlPill.style.display='none';return;}const range=sel.getRangeAt(0);const inP=passagePane.contains(range.commonAncestorContainer);const inQ=questionPane.contains(range.commonAncestorContainer);if(!inP&&!inQ){hlPill.style.display='none';return;}if(range.toString().trim()===''){hlPill.style.display='none';return;}const rect=range.getBoundingClientRect();hlPill.style.display='block';const pillW=hlPill.offsetWidth,pillH=hlPill.offsetHeight;let left=rect.left+rect.width/2-pillW/2;let top=rect.top-pillH-8;if(top<8)top=rect.bottom+8;if(left<8)left=8;if(left+pillW>window.innerWidth-8)left=window.innerWidth-pillW-8;hlPill.style.left=left+'px';hlPill.style.top=top+'px';},0);}
passagePane.addEventListener('mouseup',_showPill);
questionPane.addEventListener('mouseup',_showPill);
function _applyHighlight(range) {
  const nodes = [];
  if (range.commonAncestorContainer.nodeType === Node.TEXT_NODE) {
    nodes.push(range.commonAncestorContainer);
  } else {
    const walker = document.createTreeWalker(range.commonAncestorContainer, NodeFilter.SHOW_TEXT, null);
    while (walker.nextNode()) {
      if (range.intersectsNode(walker.currentNode)) nodes.push(walker.currentNode);
    }
  }
  nodes.forEach(textNode => {
    const r = document.createRange();
    r.selectNodeContents(textNode);
    if (textNode === range.startContainer) r.setStart(textNode, range.startOffset);
    if (textNode === range.endContainer) r.setEnd(textNode, range.endOffset);
    if (!r.toString().trim()) return;
    try {
      const span = document.createElement('span');
      span.className = 'highlight';
      r.surroundContents(span);
    } catch (e) {}
  });
}

hlPill.addEventListener('mousedown', e => {
  e.preventDefault();
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  if (!passagePane.contains(range.commonAncestorContainer) && !questionPane.contains(range.commonAncestorContainer)) return;
  _applyHighlight(range);
  sel.removeAllRanges();
  hlPill.style.display = 'none';
});
function _removeHl(e){if(e.target.classList&&e.target.classList.contains('highlight')){const span=e.target,parent=span.parentNode;while(span.firstChild)parent.insertBefore(span.firstChild,span);parent.removeChild(span);parent.normalize();}}
passagePane.addEventListener('click',_removeHl);
questionPane.addEventListener('click',_removeHl);
document.addEventListener('mousedown', e => {
  if (e.target !== hlPill && !passagePane.contains(e.target) && !questionPane.contains(e.target)) hlPill.style.display = 'none';
});

/* ============================================================
   DIVIDER DRAG
============================================================ */
const divider = document.getElementById('divider');
const mainEl = document.querySelector('.main');
let dragging = false;
divider.addEventListener('mousedown', e => {
  dragging = true;
  divider.classList.add('dragging');
  document.body.classList.add('dragging');
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = mainEl.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const pct = (x / rect.width) * 100;
  if (pct >= 20 && pct <= 80) {
    passagePane.style.flex = `0 0 ${pct}%`;
    passagePane.style.width = `${pct}%`;
  }
});
document.addEventListener('mouseup', () => {
  if (dragging) { dragging = false; divider.classList.remove('dragging'); document.body.classList.remove('dragging'); }
});

/* ============================================================
   MENU + FONT CONTROLS
============================================================ */
const hamburger = document.getElementById('hamburger');
const menuPanel = document.getElementById('menuPanel');
hamburger.addEventListener('click', e => { e.stopPropagation(); menuPanel.classList.toggle('open'); });
document.addEventListener('click', e => {
  if (!menuPanel.contains(e.target) && e.target !== hamburger && !hamburger.contains(e.target)) menuPanel.classList.remove('open');
});
document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.target;
    const dir = parseInt(btn.dataset.dir, 10);
    if (target === 'passage') {
      state.passageSize = Math.min(22, Math.max(10, state.passageSize + dir));
      passagePane.style.fontSize = state.passageSize + 'px';
      document.getElementById('passSizeVal').textContent = state.passageSize + 'px';
    } else {
      state.questionSize = Math.min(22, Math.max(10, state.questionSize + dir));
      questionPane.style.fontSize = state.questionSize + 'px';
      document.getElementById('qSizeVal').textContent = state.questionSize + 'px';
    }
  });
});

/* ============================================================
   RESULTS / BAND
============================================================ */
function bandFromCorrect(correct){
  if (correct >= 39) return 9.0;
  if (correct >= 37) return 8.5;
  if (correct >= 35) return 8.0;
  if (correct >= 33) return 7.5;
  if (correct >= 30) return 7.0;
  if (correct >= 27) return 6.5;
  if (correct >= 23) return 6.0;
  if (correct >= 19) return 5.5;
  if (correct >= 15) return 5.0;
  if (correct >= 13) return 4.5;
  return 4.0;
}

function showResults(){
  const passes = Object.keys(pRanges).map(Number);
  let totalCorrect = 0;
  let html = '';
  passes.forEach(p => {
    const [first, last] = pRanges[p];
    let correct = 0;
    let rows = '';
    for (let q = first; q <= last; q++) {
      const u = state.answers[q];
      const c = AK[q];
      let ok;
      if (ANSWER_GROUPS[q]) {
        ok = checkGroup(q, u);
      } else {
        ok = checkAnswer(u, c);
      }
      if (ok) correct++;
      rows += `<tr class="${ok?'row-correct':'row-wrong'}">
        <td><strong>${q}</strong></td>
        <td>${u !== undefined && u !== '' ? displayAnswer(u) : '<em style="color:#999">—</em>'}</td>
        <td>${displayCorrect(c)}</td>
        <td class="mark ${ok?'mark-ok':'mark-x'}">${ok?'✓':'✗'}</td>
      </tr>`;
    }
    totalCorrect += correct;
    const total = last - first + 1;
    const pct = (correct / total) * 100;
    const badge = pct >= 70 ? 'badge-green' : pct >= 50 ? 'badge-orange' : 'badge-red';
    html += `<div class="result-pass">
      <div class="result-pass-header">
        <div class="result-pass-info">
          <div class="result-pass-title">Passage ${p}: ${PASSAGE_TITLES[p]}</div>
          <div class="result-pass-sub">Questions ${first}–${last}</div>
        </div>
        <div class="score-badge ${badge}">${correct} / ${total}</div>
      </div>
      <table class="result-table">
        <thead><tr><th>Q#</th><th>Your Answer</th><th>Correct Answer</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });
  const totalPct = (totalCorrect / TOTAL_Q) * 100;
  const band = bandFromCorrect(totalCorrect);
  html += `<div class="total-strip">
    <div class="total-block"><div class="total-label">Score</div><div class="total-value">${totalCorrect} / ${TOTAL_Q}</div></div>
    <div class="total-block"><div class="total-label">Accuracy</div><div class="total-value">${totalPct.toFixed(0)}%</div></div>
    <div class="total-block"><div class="total-label">Estimated Band</div><div class="total-value total-band-value">${band.toFixed(1)}</div></div>
  </div>`;
  document.getElementById('resultsBody').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', () => document.getElementById('modal').classList.remove('open'));
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('modal').classList.remove('open'); });

/* INIT */
renderPassage();
renderQuestions();
renderNav();
updateProgress();
</script>

<script>
/* EXAM TIMER */
(function(){
  const SECS = 3600;
  const _t0 = Date.now();
  const _el = document.getElementById('examTimer');
  function _tick(){
    const rem = SECS - Math.floor((Date.now()-_t0)/1000);
    if(rem <= 0){
      _el.textContent='00:00';
      _el.classList.add('warn');
      const ov = document.querySelector('#modal');
      if(!ov || !ov.classList.contains('open')) showResults();
      return;
    }
    const m=Math.floor(rem/60), s=rem%60;
    _el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    _el.classList.toggle('warn', rem<=300);
    setTimeout(_tick,500);
  }
  _tick();
})();
</script>
