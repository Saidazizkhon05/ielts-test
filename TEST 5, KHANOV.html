<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IELTS Reading — Test 5</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;background:#fff;
    display:flex;flex-direction:column;height:100vh;-webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}

  /* HEADER */
  .header{
    height:52px;flex:0 0 52px;border-bottom:1px solid #ddd;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;background:#fff;position:relative;z-index:10;
  }
  .h-left{display:flex;align-items:center;gap:12px}
  .ielts-badge{
    background:#c41230;color:#fff;font-weight:700;
    padding:6px 12px;border-radius:4px;font-size:14px;letter-spacing:1px;
  }
  .tg-pill{
    display:inline-flex;align-items:center;gap:8px;background:#f4f4f4;
    border-radius:999px;padding:3px 14px 3px 3px;
    font-size:13px;font-weight:500;color:#1a1a1a;transition:background .15s;
  }
  .tg-pill:hover{background:#ececec}
  .tg-icon{
    width:28px;height:28px;border-radius:50%;
    background:linear-gradient(135deg,#37AEE2 0%,#1E96C8 100%);
    display:flex;align-items:center;justify-content:center;
  }
  .h-right{position:relative}
  .hamburger{
    width:36px;height:36px;border:none;background:transparent;cursor:pointer;
    border-radius:6px;display:flex;flex-direction:column;
    justify-content:center;align-items:center;gap:4px;
  }
  .hamburger:hover{background:#f0f0f0}
  .hamburger span{display:block;width:18px;height:2px;background:#333;border-radius:1px}
  .menu-panel{
    position:absolute;top:46px;right:0;background:#fff;border:1px solid #ddd;
    border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.1);
    padding:14px;min-width:240px;display:none;z-index:200;
  }
  .menu-panel.open{display:block}
  .menu-row{
    display:flex;align-items:center;justify-content:space-between;
    font-size:13px;padding:6px 0;
  }
  .menu-row+.menu-row{border-top:1px solid #f0f0f0;margin-top:2px}
  .menu-ctrls{display:flex;align-items:center;gap:6px}
  .size-btn{
    width:28px;height:28px;border:1px solid #ccc;background:#fff;border-radius:4px;
    cursor:pointer;font-weight:700;font-size:12px;font-family:inherit;
  }
  .size-btn:hover{background:#f5f5f5}
  .size-val{min-width:42px;text-align:center;font-size:12px;color:#666}

  /* PROGRESS */
  .progress{height:3px;background:#eee;flex:0 0 3px}
  .progress-fill{height:100%;background:#c41230;width:0;transition:width .25s}

  /* MAIN */
  .main{flex:1 1 auto;display:flex;overflow:hidden;min-height:0}
  .pane{overflow-y:auto;padding:24px 28px 40px;min-width:200px}
  .pane-left{background:#fafafa;width:50%;flex:0 0 50%}
  .pane-right{background:#fff;flex:1 1 auto}
  .pane::-webkit-scrollbar{width:10px}
  .pane::-webkit-scrollbar-thumb{background:#ccc;border-radius:5px}
  .pane::-webkit-scrollbar-thumb:hover{background:#aaa}
  .divider{
    width:6px;background:#e0e0e0;cursor:col-resize;flex:0 0 6px;
    position:relative;transition:background .15s;
  }
  .divider:hover,.divider.dragging{background:#c41230}
  .divider::after{
    content:'';position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);width:2px;height:34px;
    background:#999;border-radius:1px;
  }
  .divider:hover::after,.divider.dragging::after{background:#fff}

  /* PASSAGE */
  #passagePane{font-size:14px;line-height:1.65}
  .pass-title{font-size:1.55em;font-weight:700;color:#1a1a1a;margin-bottom:6px}
  .pass-sub{
    font-size:0.95em;color:#666;font-style:italic;
    margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #c41230;
  }
  .pass-body p{margin-bottom:14px;text-align:justify;hyphens:auto}
  .highlight{
    background:#fff59d;cursor:pointer;padding:1px 2px;
    border-radius:2px;transition:background .15s;
  }
  .highlight:hover{background:#ffeb3b}
  .hl-pill{
    position:fixed;background:#1a1a1a;color:#fff;padding:7px 14px;
    border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;
    z-index:1500;box-shadow:0 4px 12px rgba(0,0,0,.25);display:none;user-select:none;
  }
  .hl-pill:hover{background:#000}

  /* QUESTIONS */
  #questionPane{font-size:13px;line-height:1.55}
  .q-instr{
    background:#f5f5f5;border-left:3px solid #c41230;
    padding:10px 14px;margin-bottom:18px;
    font-size:0.95em;line-height:1.55;border-radius:0 4px 4px 0;
  }
  .q-instr strong{color:#c41230}
  .q-item{margin-bottom:16px;padding:6px 0;scroll-margin-top:30px}
  .q-num{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:26px;height:22px;background:#1a1a1a;color:#fff;
    padding:0 6px;border-radius:3px;font-weight:700;font-size:11px;
    margin-right:8px;flex-shrink:0;
  }
  .q-text{margin-bottom:8px;line-height:1.55;display:flex;align-items:flex-start}
  .q-text-body{flex:1}
  .q-options{display:flex;flex-direction:column;gap:6px;margin-left:34px}
  .q-options.radio-row{flex-direction:row;gap:0;flex-wrap:wrap}
  .q-options.mcq-vert{flex-direction:column;gap:6px}
  .opt-label{
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;
    padding:5px 10px;border:1px solid #ccc;background:#fff;
    font-size:0.92em;transition:all .12s;user-select:none;border-radius:4px;
  }
  .opt-label:hover{background:#f5f5f5}
  .opt-label input{cursor:pointer;margin:0}
  .opt-label.selected{background:#c41230;color:#fff;border-color:#c41230}
  .radio-row .opt-label{border-radius:0;border-right:none}
  .radio-row .opt-label:first-of-type{border-radius:4px 0 0 4px}
  .radio-row .opt-label:last-of-type{border-radius:0 4px 4px 0;border-right:1px solid #ccc}
  .radio-row .opt-label.selected+.opt-label{border-left-color:#c41230}

  .q-input{
    border:none;border-bottom:2px solid #888;background:transparent;
    font-family:inherit;font-size:inherit;color:inherit;
    padding:2px 4px;min-width:110px;outline:none;
    transition:border-color .15s,background .15s;
  }
  .q-input:focus{border-bottom-color:#c41230;background:#fffbe5}
  .q-input.has-value{background:#fff3cd;border-bottom-color:#f9a825}

  /* Q# prefix blank (inline in table/summary) */
  .q-blank{display:inline-block;white-space:nowrap;margin:0 2px}
  .q-blank-num{
    display:inline-block;vertical-align:middle;min-width:20px;height:18px;
    background:#1a1a1a;color:#fff;border-radius:3px;
    font-weight:700;font-size:10px;padding:0 5px;line-height:18px;
    margin-right:4px;text-align:center;
  }
  .q-blank input{vertical-align:middle;min-width:100px;max-width:160px}

  /* Completion table */
  .completion-table{
    width:100%;border-collapse:collapse;margin-bottom:20px;font-size:0.95em;
  }
  .completion-table th,.completion-table td{
    border:2px solid #b0b0b0;padding:12px 16px;
    vertical-align:middle;line-height:2;
  }
  .completion-table thead th{
    background:#f0f0f0;font-weight:700;text-align:center;
    color:#333;text-transform:uppercase;letter-spacing:.5px;
  }
  .completion-table td:first-child{
    font-weight:700;text-align:center;width:66px;
    background:#fafafa;color:#555;font-size:0.95em;
  }

  /* Matching list */
  .matching-list{
    border:2px solid #c0c0c0;border-radius:8px;
    padding:14px 20px;background:#fcfcfa;margin-bottom:18px;
  }
  .matching-list-title{
    font-weight:700;text-align:center;margin-bottom:10px;
    padding-bottom:8px;border-bottom:1px solid #ddd;font-size:1.05em;
  }
  .matching-list ol{list-style:none;padding:0;margin:0}
  .matching-list li{padding:5px 0;display:flex;gap:10px;line-height:1.5}
  .matching-list .letter{font-weight:700;flex-shrink:0;min-width:22px;color:#c41230}
  .matching-list .desc{flex:1}
  .matching-list ol.two-col{
    display:grid;grid-template-columns:1fr 1fr;gap:0 24px;
  }

  /* Select dropdown */
  .q-select{
    font-family:inherit;font-size:0.92em;padding:5px 8px;
    border:1px solid #888;border-radius:4px;background:#fff;
    cursor:pointer;color:inherit;outline:none;
    transition:border-color .15s,background .15s;
  }
  .q-select:focus{border-color:#c41230}
  .q-select.has-value{background:#fff3cd;border-color:#f9a825}
  .q-select.narrow{min-width:80px;max-width:120px}
  .q-select.medium{min-width:160px;max-width:200px}
  .q-select.wide{min-width:200px;max-width:300px}
  .select-q-row{
    display:flex;align-items:center;gap:10px;
    margin-bottom:14px;padding:6px 0;
    flex-wrap:wrap;scroll-margin-top:30px;
  }
  .select-q-row .q-num{flex-shrink:0}
  .select-q-text{flex:1;min-width:0;line-height:1.7}

  /* BOTTOM NAV */
  .bottom-nav{
    height:44px;flex:0 0 44px;background:#f0f0f0;border-top:1px solid #ddd;
    display:flex;align-items:center;padding:0 12px;gap:8px;
    overflow-x:auto;overflow-y:hidden;
  }
  .bottom-nav::-webkit-scrollbar{height:4px}
  .bottom-nav::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
  .nav-pass{
    font-weight:700;font-size:13px;cursor:pointer;padding:5px 10px;
    border-radius:4px;white-space:nowrap;transition:background .15s;flex-shrink:0;
  }
  .nav-pass:hover{background:#e0e0e0}
  .nav-pass.active{color:#c41230}
  .nav-pass small{font-weight:500;color:#666;font-size:0.85em}
  .q-pill{
    width:26px;height:26px;border:1px solid #bbb;background:#fff;
    border-radius:4px;font-size:11px;cursor:pointer;flex-shrink:0;
    display:inline-flex;align-items:center;justify-content:center;
    font-family:inherit;color:#333;transition:all .12s;
  }
  .q-pill:hover{background:#ebebeb;border-color:#999}
  .q-pill.answered{font-weight:700;background:#ffd54f;border-color:#f9a825;color:#5d4037}
  .nav-sep{width:1px;height:26px;background:#ccc;flex-shrink:0;margin:0 4px}
  .nav-spacer{flex:1}
  .submit-btn{
    height:30px;padding:0 16px;background:#28a745;color:#fff;
    border:none;border-radius:4px;cursor:pointer;font-weight:600;
    font-size:13px;font-family:inherit;
    display:inline-flex;align-items:center;gap:6px;
    flex-shrink:0;transition:background .15s;
  }
  .submit-btn:hover{background:#218838}

  /* MODAL */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.6);
    display:none;align-items:center;justify-content:center;
    padding:20px;z-index:3000;
  }
  .modal-overlay.open{display:flex}
  .modal{
    background:#fff;border-radius:10px;max-width:820px;width:100%;
    max-height:90vh;overflow-y:auto;padding:28px;position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
  }
  .modal-close{
    position:absolute;top:14px;right:14px;background:transparent;border:none;
    font-size:28px;line-height:1;cursor:pointer;color:#888;
    width:34px;height:34px;border-radius:50%;transition:background .15s;
  }
  .modal-close:hover{background:#f0f0f0;color:#000}
  .modal h2{margin-bottom:20px;font-size:24px;color:#1a1a1a}
  .result-pass{
    margin-bottom:20px;border:1px solid #e0e0e0;
    border-radius:8px;overflow:hidden;
  }
  .result-pass-header{
    background:#fafafa;padding:14px 18px;
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    border-bottom:1px solid #e0e0e0;
  }
  .result-pass-info{flex:1;min-width:0}
  .result-pass-title{font-weight:700;font-size:14px;color:#1a1a1a}
  .result-pass-sub{font-size:12px;color:#666;margin-top:3px}
  .score-badge{
    padding:5px 14px;border-radius:999px;
    color:#fff;font-weight:700;font-size:13px;flex-shrink:0;
  }
  .badge-green{background:#28a745}
  .badge-orange{background:#fd7e14}
  .badge-red{background:#dc3545}
  .result-table{width:100%;border-collapse:collapse;font-size:13px}
  .result-table th,.result-table td{
    padding:8px 14px;text-align:left;border-bottom:1px solid #f0f0f0;
  }
  .result-table th{
    background:#f9f9f9;font-weight:600;font-size:12px;
    color:#555;text-transform:uppercase;letter-spacing:.4px;
  }
  .result-table td{vertical-align:middle}
  .row-correct{background:#e8f5e9}
  .row-wrong{background:#ffebee}
  .mark{font-weight:700;font-size:15px}
  .mark-ok{color:#28a745}
  .mark-x{color:#dc3545}
  .total-strip{
    margin-top:24px;padding:22px 24px;
    background:linear-gradient(135deg,#c41230 0%,#8b0d23 100%);
    color:#fff;border-radius:10px;
    display:flex;justify-content:space-around;align-items:center;
    text-align:center;flex-wrap:wrap;gap:16px;
  }
  .total-block{flex:1;min-width:140px}
  .total-label{font-size:12px;text-transform:uppercase;letter-spacing:1px;opacity:.85}
  .total-value{font-size:32px;font-weight:700;margin-top:2px}
  .total-band-value{font-size:36px}

  body.dragging{user-select:none;cursor:col-resize}
  body.dragging *{cursor:col-resize!important}

  /* ── EXAM TIMER ── */
  .timer{
    font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;
    color:#1a1a1a;background:#f5f5f5;border:1px solid #ddd;
    border-radius:6px;padding:4px 10px;letter-spacing:1.5px;
    transition:color .3s,background .3s,border-color .3s;
    flex-shrink:0;
  }
  .timer.warn{color:#c41230;background:#fff0f0;border-color:#f5c6cb;animation:pulse .8s ease-in-out infinite alternate;}
  @keyframes pulse{from{opacity:1}to{opacity:.6}}
</style>
</head>

<script>
/* ============================================================
   HELPERS
============================================================ */
function escapeAttr(s){
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function blank(n){
  return `<span class="q-blank"><span class="q-blank-num">${n}</span><input class="q-input" data-q="${n}" autocomplete="off" spellcheck="false"></span>`;
}
function displayAnswer(v){
  if (!v && v !== 0) return '—';
  if (v==='T') return 'TRUE'; if (v==='F') return 'FALSE';
  if (v==='Y') return 'YES'; if (v==='N') return 'NO';
  if (v==='NGV') return 'NOT GIVEN';
  return v;
}
function normalize(s){ return String(s).trim().toLowerCase().replace(/\s+/g,' '); }
function checkAnswer(user, correct){
  if (!user) return false;
  const u = normalize(user);
  return (Array.isArray(correct) ? correct : [correct]).some(c => normalize(c) === u);
}
function displayCorrect(c){
  return displayAnswer(Array.isArray(c) ? c[0] : c);
}

/* Lucy options string (A-J) for inline selects */
const LUCY_OPTS = `<option value="">— select —</option>
  <option value="A">A — method</option>
  <option value="B">B — language</option>
  <option value="C">C — cardboard</option>
  <option value="D">D — design</option>
  <option value="E">E — purpose</option>
  <option value="F">F — gender</option>
  <option value="G">G — box</option>
  <option value="H">H — material</option>
  <option value="I">I — similarity</option>
  <option value="J">J — wood</option>`;

/* ============================================================
   PASSAGES
============================================================ */
const PASSAGES = {
  1: `
    <h1 class="pass-title">Manhattan's Skyscrapers Race to the Top</h1>
    <div class="pass-sub">The rise of New York's skyscrapers: 1890–1960s</div>
    <div class="pass-body">
      <p>During the late 19th and 20th centuries, New York City and the skyline of Manhattan, the most famous of the city's five boroughs, or districts, were radically transformed. New technology, stronger building materials, and abundant labor allowed the towers of Manhattan to rise — eventually becoming the tallest in the world.</p>
      <p>The race to the sky began in 1854, when inventor Elisha Otis demonstrated his elevator safety brake to curious crowds in New York. No matter how many times a man cut through cables holding the elevator platform high above gasping onlookers, Otis would descend just a few inches before safely stopping. Along with Otis's elevator, other innovations laid the groundwork for the future. In 1855 Henry Bessemer patented his process for producing a new kind of strong and low-cost steel. Plate glass, produced in volume from the 1850s, and electric lighting in the 1880s also contributed to the rise of the skyscraper.</p>
      <p>Technology alone did not create the Manhattan skyline. Other essential factors included an increasing population, soaring property values, rivalry, geology, vanity, and greed. In 1871, when Chicago developers built the first so-called 'skyscraper', New York entrepreneurs responded as they had a geological advantage. While Chicago was built on muddy soil, Manhattan stood on solid granite. And because Manhattan was surrounded by water, there was little room for ambitious new buildings to grow unless they looked upward.</p>
      <p>The first tall buildings to rise in New York City appeared in the late 1800s. Completed in 1890, the 94-meter New York World Building was the tallest in the world until the Manhattan Life Insurance Building surpassed it four years later, setting the fast pace and ambitious character of future Manhattan skyscrapers.</p>
      <p>These buildings were striking achievements, but perhaps the most stunning was the Woolworth Building, completed in 1912. At 222 meters, the Woolworth became the world's tallest building. Upon its completion, this architectural wonder was soon as much a symbol of New York City as the famous Statue of Liberty. It promised freedom and very big dreams.</p>
      <p>As parts of New York began to resemble man-made mountain ranges, concerns over the nature of skyscrapers grew. From the sidewalks, streets felt increasingly like canyons. To counteract this, from 1916, city authorities issued zoning laws that stipulated that tall buildings must become narrower at higher levels — causing Manhattan's skyscrapers to resemble multi-layered wedding cakes.</p>
      <p>In 1928, construction began on one of New York's most iconic structures: the Chrysler Building. Walter Chrysler, a motor-industry leader, incorporated several unique features into his building's design. Much of the building's distinctive ornamentation resembled features of the automobile from which Chrysler made his fortune. Upon completion, the Chrysler Building was the world's tallest, at 319 meters high.</p>
      <p>The Chrysler Building's time at the top would be short. Just 11 months after the Chrysler's completion in May 1930, the 102-story Empire State Building became the world's tallest building. It was opened by the U.S. president to great acclaim. At 381 meters, the tower matched the ambition of the New York financier John J. Raskob, who commissioned the legendary skyscraper.</p>
      <p>Unfortunately, the American economy crashed as the Empire State Building rose at record speed. Not even the building's famous appearance in the 1933 movie King Kong could boost its fortunes. Unable to find tenants, Raskob's magnificent structure was mockingly called the 'Empty State Building.' It took World War II to fill the building with government agencies. Even then, a B-25 bomber almost brought it down, crashing — accidentally — between the 78th and 80th floors in dense fog on July 28, 1945. Five years later, the Empire State Building finally turned a profit. The building itself was an architectural marvel, remaining the world's tallest skyscraper for 40 years.</p>
      <p>In the years following World War II, architecture in New York transformed again. Instead of decorative designs, buildings started to favor a modern look with a sleek design and gleaming surfaces. Completed in 1952, the United Nations Building was constructed in this style. Designed by the Swiss architect Le Corbusier, the slim tower was like nothing the city had seen before. The trend toward modern lines continued into the 1950s. By the time the Seagram Building was completed in 1958, rectilinear office buildings — with their straight up-and-down walls — were to become typical. With its unique bronze exterior, it was not the tallest building in New York, but it became a model for designing other office towers built from the 1960s onward.</p>
      <p>Le Corbusier is often cited as the villain behind this move towards less elegant architecture, yet when he visited New York in 1935 and witnessed the physical impact of skyscrapers for the first time, he said: 'The skyscrapers of New York are romantic, a gesture of pride... but the street has been killed...'. Today his observation hardly seems true: Manhattan's skyscrapers failed to kill the street. In fact, New York City remains one of the world's great walking cities, its avenues and streets lined by towering giants born of a golden age of opportunity and ambition.</p>

      <p>The rest of the pack is made up of mid- to low-ranking non-breeding adults and the immature offspring of the alpha and its mate. The size of the group varies from around six to ten members or more, depending on the abundance of food and numbers of the wolf population in general.</p>
      <p>Wolves have earned themselves an undeserved reputation for being ruthless predators and a danger to humans and livestock. The wolf has been portrayed in fairy tales and folklore as a very bad creature, killing any people and other animals it encounters. However, the truth is that wolves only kill to eat, never kill more than they need, and rarely attack humans unless their safety is threatened in some way. It has been suggested that hybrid wolf-dogs or wolves suffering from rabies are actually responsible for many of the historical offences as well as more recent incidents.</p>

      <p>Does the language you speak influence the way you think? Does it help define your world view? Anyone who has tried to master a foreign tongue has at least thought about the possibility.</p>
      <p>At first glance the idea seems perfectly plausible. Conveying even simple messages requires that you make completely different observations depending on your language. Imagine being asked to count some pens on a table. As an English speaker, you only have to count them and give the number. But a Russian may need to consider the gender and a Japanese speaker has to take into account their shape (long and cylindrical) as well, and use the number word designated for items of that shape.</p>
      <p>On the other hand, surely pens are just pens, no matter what your language compels you to specify about them? Little linguistic peculiarities, though amusing, don't change the objective world we are describing. So how can they alter the way we think?</p>
      <p>Scientists and philosophers have been grappling with this thorny question for centuries. There have always been those who argue that our picture of the Universe depends on our native tongue. Since the 1960s, however, with the ascent of thinkers like Noam Chomsky, and a host of cognitive scientists, the consensus has been that linguistic differences don't really matter, that language is a universal human trait, and that our ability to talk to one another owes more to our shared genetics than to our varying cultures. But now the pendulum is beginning to swing the other way as psychologists re-examine the question.</p>

      <p>To start with the simplest and perhaps subtlest example, preparing to say something in a particular language demands that you pay attention to certain things and ignore others. In Korean, for instance, simply to say 'hello' you need to know if you're older or younger than the person you're addressing. Spanish speakers have to decide whether they are on intimate enough terms to call someone by the informal <em>tu</em> rather than the formal <em>Usted</em>. In Japanese, simply deciding which form of the word 'I' to use demands complex calculations involving things such as your gender, their gender and your relative status. Slobin argues that this process can have a huge impact on what we deem important and, ultimately, how we think about the world.</p>

function renderPassage(){

function renderRadioItem(n, text, pairs, current, cls){
  const opts = pairs.map(([v,l]) =>
    `<label class="opt-label ${current===v?'selected':''}">
      <input type="radio" name="q${n}" value="${v}" ${current===v?'checked':''}> ${l}
    </label>`).join('');
  return `<div class="q-item" id="q-${n}">
    <div class="q-text"><span class="q-num">${n}</span><span class="q-text-body">${text}</span></div>
    <div class="q-options ${cls}">${opts}</div>
  </div>`;
}

function renderQuestions(){
  const items = QUESTIONS[state.activePassage];
  let html = '';
  for (const item of items) {
    if (item.type === 'group-header') { html += item.content; continue; }
    if (item.type === 'tfng') {
      html += renderRadioItem(item.n, item.text,
        [['T','TRUE'],['F','FALSE'],['NGV','NOT GIVEN']],
        state.answers[item.n]||'', 'radio-row');
      continue;
    }
    if (item.type === 'ynng') {
      html += renderRadioItem(item.n, item.text,
        [['Y','YES'],['N','NO'],['NGV','NOT GIVEN']],
        state.answers[item.n]||'', 'radio-row');
      continue;
    }
    if (item.type === 'mcq') {
      html += renderRadioItem(item.n, item.text, item.options, state.answers[item.n]||'', 'mcq-vert');
      continue;
    }
    if (item.type === 'select-q') {
      const cur = state.answers[item.n]||'';
      const sc = item.selectClass||'';
      const opts = `<option value="">— select —</option>` +
        item.options.map(([v,l]) => `<option value="${v}" ${cur===v?'selected':''}>${escapeAttr(l)}</option>`).join('');
      html += `<div class="q-item select-q-row" id="q-${item.n}">
        <span class="q-num">${item.n}</span>
        <span class="select-q-text">${item.text}</span>
        <select class="q-select ${sc} ${cur?'has-value':''}" data-q="${item.n}">${opts}</select>
      </div>`;
      continue;
    }
    if (item.type === 'html') { html += item.content; }
  }
  questionPane.innerHTML = html;
  questionPane.style.fontSize = state.questionSize + 'px';
  hydrateInputs();
  attachQuestionListeners();
}

function hydrateInputs(){
  questionPane.querySelectorAll('input.q-input[data-q]').forEach(inp => {
    const cur = state.answers[inp.dataset.q];
    if (cur && !inp.value) inp.value = cur;
    if (inp.value) inp.classList.add('has-value');
  });
  questionPane.querySelectorAll('select.q-select[data-q]').forEach(sel => {
    const cur = state.answers[sel.dataset.q];
    if (cur && !sel.value) { sel.value = cur; sel.classList.add('has-value'); }
  });
}

function attachQuestionListeners(){
  questionPane.querySelectorAll('input[type="radio"]').forEach(r => {
    r.addEventListener('change', e => {
      const key = e.target.name.substring(1);
      state.answers[key] = e.target.value;
      questionPane.querySelectorAll(`input[name="${e.target.name}"]`).forEach(rr =>
        rr.closest('.opt-label').classList.toggle('selected', rr.checked));
      updateNav(); updateProgress();
    });
  });
  questionPane.querySelectorAll('input.q-input[data-q]').forEach(inp => {
    inp.addEventListener('input', e => {
      const key = e.target.dataset.q;
      const v = e.target.value.trim();
      if (v) state.answers[key] = e.target.value; else delete state.answers[key];
      e.target.classList.toggle('has-value', !!v);
      updateNav(); updateProgress();
    });
  });
  questionPane.querySelectorAll('select.q-select[data-q]').forEach(sel => {
    sel.addEventListener('change', e => {
      const key = e.target.dataset.q;
      const v = e.target.value;
      if (v) state.answers[key] = v; else delete state.answers[key];
      e.target.classList.toggle('has-value', !!v);
      updateNav(); updateProgress();
    });
  });
}

    }
  });
  html += `<div class="nav-spacer"></div><button class="submit-btn" id="submitBtn">✓ Submit</button>`;
  bottomNav.innerHTML = html;
  bottomNav.querySelectorAll('.q-pill').forEach(p => {
    p.addEventListener('click', () => {
      const q = p.dataset.q;
      const el = document.getElementById('q-'+q) || questionPane.querySelector(`[data-q="${q}"]`);
      if (el) {
        el.scrollIntoView({behavior:'smooth',block:'center'});
        if (el.tagName==='INPUT'||el.tagName==='SELECT') setTimeout(()=>el.focus(),320);
        else { el.style.transition='background .3s'; el.style.background='#fffbe5'; setTimeout(()=>el.style.background='',700); }
      }
    });
  });
  bottomNav.querySelectorAll('.nav-pass').forEach(l => {
    l.addEventListener('click', () => {
      const p = parseInt(l.dataset.pass,10);
      if (p !== state.activePassage) {
        state.activePassage = p;
        renderPassage(); renderQuestions(); renderNav();
        passagePane.scrollTop = 0; questionPane.scrollTop = 0;
      }
    });
  });
  document.getElementById('submitBtn').addEventListener('click', showResults);
}

function updateNav(){ renderNav(); }
function updateProgress(){
  const answered = Object.keys(state.answers).length;
  progressFill.style.width = (answered/TOTAL_Q*100)+'%';
}

/* ============================================================
   HIGHLIGHT
============================================================ */
function _showPill(){setTimeout(()=>{const sel=window.getSelection();if(!sel||sel.isCollapsed){hlPill.style.display='none';return;}const range=sel.getRangeAt(0);const inP=passagePane.contains(range.commonAncestorContainer);const inQ=questionPane.contains(range.commonAncestorContainer);if(!inP&&!inQ){hlPill.style.display='none';return;}if(!range.toString().trim()){hlPill.style.display='none';return;}const rect=range.getBoundingClientRect();hlPill.style.display='block';const pw=hlPill.offsetWidth,ph=hlPill.offsetHeight;let left=rect.left+rect.width/2-pw/2;let top=rect.top-ph-8;if(top<8)top=rect.bottom+8;left=Math.max(8,Math.min(left,window.innerWidth-pw-8));hlPill.style.left=left+'px';hlPill.style.top=top+'px';},0);}
passagePane.addEventListener('mouseup',_showPill);
questionPane.addEventListener('mouseup',_showPill);
hlPill.addEventListener('mousedown', e => {
  e.preventDefault();
  const sel = window.getSelection();
  if (!sel||sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  if (!passagePane.contains(range.commonAncestorContainer) && !questionPane.contains(range.commonAncestorContainer)) return;
  try {
    const span = document.createElement('span');
    span.className = 'highlight';
    span.appendChild(range.extractContents());
    range.insertNode(span);
    sel.removeAllRanges();
  } catch(e){}
  hlPill.style.display = 'none';
});
function _removeHl(e){if(e.target.classList&&e.target.classList.contains('highlight')){const s=e.target,p=s.parentNode;while(s.firstChild)p.insertBefore(s.firstChild,s);p.removeChild(s);p.normalize();}}
passagePane.addEventListener('click',_removeHl);
questionPane.addEventListener('click',_removeHl);
document.addEventListener('mousedown', e => {
  if (e.target!==hlPill&&!passagePane.contains(e.target)&&!questionPane.contains(e.target)) hlPill.style.display='none';
});

/* ============================================================
   DIVIDER DRAG
============================================================ */
const divider=document.getElementById('divider');
const mainEl=document.querySelector('.main');
let dragging=false;
divider.addEventListener('mousedown',e=>{dragging=true;divider.classList.add('dragging');document.body.classList.add('dragging');e.preventDefault();});
document.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const rect=mainEl.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width*100;
  if(pct>=20&&pct<=80){passagePane.style.flex=`0 0 ${pct}%`;passagePane.style.width=`${pct}%`;}
});
document.addEventListener('mouseup',()=>{if(dragging){dragging=false;divider.classList.remove('dragging');document.body.classList.remove('dragging');}});

/* ============================================================
   MENU + FONT
============================================================ */
const hamburger=document.getElementById('hamburger');
const menuPanel=document.getElementById('menuPanel');
hamburger.addEventListener('click',e=>{e.stopPropagation();menuPanel.classList.toggle('open');});
document.addEventListener('click',e=>{
  if(!menuPanel.contains(e.target)&&e.target!==hamburger&&!hamburger.contains(e.target)) menuPanel.classList.remove('open');
});
document.querySelectorAll('.size-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const target=btn.dataset.target, dir=parseInt(btn.dataset.dir,10);
    if(target==='passage'){
      state.passageSize=Math.min(22,Math.max(10,state.passageSize+dir));
      passagePane.style.fontSize=state.passageSize+'px';
      document.getElementById('passSizeVal').textContent=state.passageSize+'px';
    } else {
      state.questionSize=Math.min(22,Math.max(10,state.questionSize+dir));
      questionPane.style.fontSize=state.questionSize+'px';
      document.getElementById('qSizeVal').textContent=state.questionSize+'px';
    }
  });
});

/* ============================================================
   RESULTS
============================================================ */
function bandFromCorrect(n){
  if(n>=39)return 9.0; if(n>=37)return 8.5; if(n>=35)return 8.0;
  if(n>=33)return 7.5; if(n>=30)return 7.0; if(n>=27)return 6.5;
  if(n>=23)return 6.0; if(n>=19)return 5.5; if(n>=15)return 5.0;
  if(n>=13)return 4.5; return 4.0;
}

function showResults(){
  const passes=[1,2,3];
  let totalCorrect=0, html='';
  passes.forEach(p=>{
    const [first,last]=pRanges[p];
    let correct=0,rows='';
    for(let q=first;q<=last;q++){
      const u=state.answers[q], c=AK[q];
      const ok=checkAnswer(u,c);
      if(ok) correct++;
      rows+=`<tr class="${ok?'row-correct':'row-wrong'}">
        <td><strong>${q}</strong></td>
        <td>${u!==undefined&&u!==''?displayAnswer(u):'<em style="color:#999">—</em>'}</td>
        <td>${displayCorrect(c)}</td>
        <td class="mark ${ok?'mark-ok':'mark-x'}">${ok?'✓':'✗'}</td>
      </tr>`;
    }
    totalCorrect+=correct;
    const total=last-first+1;
    const pct=correct/total*100;
    const badge=pct>=70?'badge-green':pct>=50?'badge-orange':'badge-red';
    html+=`<div class="result-pass">
      <div class="result-pass-header">
        <div class="result-pass-info">
          <div class="result-pass-title">Passage ${p}: ${PASSAGE_TITLES[p]}</div>
          <div class="result-pass-sub">Questions ${first}–${last}</div>
        </div>
        <div class="score-badge ${badge}">${correct} / ${total}</div>
      </div>
      <table class="result-table">
        <thead><tr><th>Q#</th><th>Your Answer</th><th>Correct Answer</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });
  const band=bandFromCorrect(totalCorrect);
  html+=`<div class="total-strip">
    <div class="total-block"><div class="total-label">Score</div><div class="total-value">${totalCorrect} / ${TOTAL_Q}</div></div>
    <div class="total-block"><div class="total-label">Accuracy</div><div class="total-value">${(totalCorrect/TOTAL_Q*100).toFixed(0)}%</div></div>
    <div class="total-block"><div class="total-label">Estimated Band</div><div class="total-value total-band-value">${band.toFixed(1)}</div></div>
  </div>`;
  document.getElementById('resultsBody').innerHTML=html;
  document.getElementById('modal').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modal').classList.remove('open'));
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')document.getElementById('modal').classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal').classList.remove('open');});

/* INIT */
renderPassage(); renderQuestions(); renderNav(); updateProgress();
</script>

<script>
/* EXAM TIMER */
(function(){
  const SECS = 3600;
  const _t0 = Date.now();
  const _el = document.getElementById('examTimer');
  function _tick(){
    const rem = SECS - Math.floor((Date.now()-_t0)/1000);
    if(rem <= 0){
      _el.textContent='00:00';
      _el.classList.add('warn');
      const ov = document.querySelector('#modal');
      if(!ov || !ov.classList.contains('open')) showResults();
      return;
    }
    const m=Math.floor(rem/60), s=rem%60;
    _el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    _el.classList.toggle('warn', rem<=300);
    setTimeout(_tick,500);
  }
  _tick();
})();
</script>
